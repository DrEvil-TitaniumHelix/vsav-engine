<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Claude Plays VASSAL</title>
<style>
  html,body { margin:0; height:100%; overflow:hidden; background:#1a1c20; font-family:Segoe UI,sans-serif; }
  #topbar { position:fixed; top:0; left:0; right:0; height:44px; background:#23262c; color:#ddd;
            display:flex; align-items:center; gap:14px; padding:0 14px; z-index:50; font-size:14px;
            box-shadow:0 2px 8px rgba(0,0,0,.5); }
  #topbar b { color:#fff; }
  .sidebtn { padding:4px 12px; border-radius:5px; border:1px solid #555; background:#2c2f36;
             color:#ccc; cursor:pointer; }
  .sidebtn.on { background:#3a6ea5; color:#fff; border-color:#6aa0d8; }
  #progress { margin-left:auto; color:#9fc27f; }
  #note { color:#8a8f98; font-size:12px; }
  #viewport { position:absolute; top:44px; left:0; right:0; bottom:0; overflow:hidden; cursor:grab; }
  #world { position:absolute; transform-origin:0 0; }
  #world img.map { display:block; user-select:none; -webkit-user-drag:none; }
  svg#overlay { position:absolute; top:0; left:0; pointer-events:none; }
  .counter { position:absolute; cursor:pointer;
             user-select:none; -webkit-user-drag:none; border-radius:4px; }
  .counter.done { filter:grayscale(.9) brightness(.65); }
  .counter.sel { outline:3px solid #ffd75e; outline-offset:1px; z-index:30!important; }
  .counter.dragging { z-index:40!important; pointer-events:none; opacity:.85; }
  .badge { position:absolute; margin:-48px 0 0 14px; background:#c33; color:#fff; font-size:11px;
           border-radius:8px; padding:0 5px; z-index:31; pointer-events:none; }
  #picker { position:fixed; display:none; background:#23262c; border:1px solid #556; border-radius:8px;
            z-index:60; color:#ddd; min-width:210px; box-shadow:0 6px 24px rgba(0,0,0,.6); font-size:13px; }
  #picker div.item { padding:7px 12px; cursor:pointer; display:flex; gap:8px; align-items:center; }
  #picker div.item:hover { background:#3a3f48; }
  #picker img { width:26px; height:26px; }
  #picker .hdr { padding:6px 12px; color:#8a8f98; border-bottom:1px solid #444; font-size:11px; }
  #actions { position:fixed; display:none; z-index:60; background:#23262c; border:1px solid #556;
             border-radius:8px; padding:8px 10px; color:#ddd; font-size:13px; box-shadow:0 6px 24px rgba(0,0,0,.6); }
  #actions button { margin-left:8px; }
  #toast { position:fixed; left:50%; transform:translateX(-50%); bottom:60px; display:none;
           background:#5a2323; border:1px solid #c33; color:#ffd8d0; padding:10px 18px;
           border-radius:8px; z-index:70; font-size:14px; max-width:70%;
           box-shadow:0 6px 24px rgba(0,0,0,.6); }
  #tip { position:fixed; display:none; z-index:80; pointer-events:none;
         background:#23262cf5; border:1px solid #556; border-radius:8px; padding:8px 11px;
         color:#dde3ea; font-size:12.5px; max-width:300px; line-height:1.5;
         box-shadow:0 6px 24px rgba(0,0,0,.6); }
  #tip b { color:#fff; font-size:13px; }
  .dim { color:#9aa3ad; }
  #rulespanel { display:none; position:fixed; top:52px; right:8px; width:440px; max-width:44vw;
                max-height:82vh; overflow:auto; background:#23262cee; color:#dde3ea;
                font-size:13px; border:1px solid #3a3f47; border-radius:8px;
                padding:10px 14px; z-index:45; box-shadow:0 6px 24px rgba(0,0,0,.5); }
  #rulespanel ul { margin:4px 0 8px; padding-left:20px; }
  #rulespanel li { margin:3px 0; }
  #tablespanel { display:none; position:fixed; top:52px; right:8px; width:600px; max-width:60vw;
                 max-height:82vh; overflow:auto; background:#23262cf5; color:#dde3ea;
                 font-size:13px; border:1px solid #3a3f47; border-radius:8px;
                 padding:10px 14px; z-index:46; box-shadow:0 6px 24px rgba(0,0,0,.5); }
  #tablespanel h3 { margin:10px 0 3px; font-size:14px; color:#fff; }
  #tablespanel .cite { color:#8a8f98; font-size:11.5px; margin-bottom:6px; }
  #tablespanel table { border-collapse:collapse; margin:4px 0 6px; font-variant-numeric:tabular-nums; }
  #tablespanel th, #tablespanel td { border:1px solid #3a3f47; padding:3px 7px; text-align:center; }
  #tablespanel th { background:#2c2f36; color:#c8d2dc; font-weight:600; }
  #tablespanel td:first-child, #tablespanel th:first-child { text-align:left; white-space:nowrap; color:#cdd6df; }
  #tablespanel .legend { margin:2px 0 6px; padding-left:2px; }
  #tablespanel .legend div { margin:2px 0; }
  #tablespanel .legend code { color:#ffd75e; font-weight:600; margin-right:6px; }
  #tablespanel .notes { color:#9aa3ad; font-size:12px; margin:2px 0 4px; padding-left:16px; }
  #tablespanel .notes li { margin:2px 0; }
</style>
</head>
<body>
<div id="topbar">
  <b id="gamename">…</b>
  <span>play as:</span>
  <span id="sidebtns"></span>
  <span id="flowbar" style="display:none; color:#ffd75e; font-weight:600"></span>
  <button class="sidebtn" id="endphasebtn" style="display:none">End player turn</button>
  <span id="aictl" style="display:none; align-items:center; gap:6px">
    <span style="color:#9fc27f; font-weight:600">AI</span>
    <select id="aimode" style="background:#2c2f36;color:#ccc;border:1px solid #555;border-radius:4px">
      <option value="step" selected>stepped (SPACE)</option>
      <option value="auto">auto play</option>
    </select>
    <span style="font-size:12px">pace</span>
    <select id="aipace" style="background:#2c2f36;color:#ccc;border:1px solid #555;border-radius:4px">
      <option value="1200">slow</option>
      <option value="600" selected>normal</option>
      <option value="250">fast</option>
    </select>
    <button class="sidebtn" id="aiplaybtn">▶ Play AI turn</button>
    <span id="aithinking" style="display:none; color:#ffd75e">⏳ thinking…</span>
  </span>
  <span id="progress"></span>
  <span id="note"></span>
  <button class="sidebtn" id="tierbtn" style="display:none"></button>
  <button class="sidebtn" id="rulesbtn">Rules</button>
  <button class="sidebtn" id="tablesbtn">Tables</button>
  <button class="sidebtn" id="menubtn" onclick="location.href='/menu'">☰ Games</button>
  <button class="sidebtn" id="resetbtn">Reset game</button>
</div>
<div id="tierpanel" style="display:none; position:fixed; top:52px; right:8px; width:360px;
     background:#23262cee; color:#dde3ea; font-size:13px; border:1px solid #3a3f47;
     border-radius:8px; padding:10px 14px; z-index:46; box-shadow:0 6px 24px rgba(0,0,0,.5);"></div>
<div id="viewport">
  <div id="world">
    <img class="map">
    <svg id="overlay"></svg>
  </div>
</div>
<div id="picker"></div>
<div id="actions"></div>
<div id="tip"></div>
<div id="rulespanel"></div>
<div id="tablespanel"></div>
<div id="arrivals" style="display:none; position:fixed; top:52px; left:8px; max-width:340px;
     max-height:60vh; overflow:auto; background:#23262cee; color:#dde3ea; font-size:13px;
     border:1px solid #3a3f47; border-radius:8px; padding:10px 12px; z-index:30;
     box-shadow:0 6px 24px rgba(0,0,0,.5);"></div>
<div id="combat" style="display:none; position:fixed; top:52px; right:8px; max-width:360px;
     max-height:70vh; overflow:auto; background:#2c2320ee; color:#e8ddd4; font-size:13px;
     border:1px solid #55423a; border-radius:8px; padding:10px 12px; z-index:30;
     box-shadow:0 6px 24px rgba(0,0,0,.5);"></div>
<div id="toast"></div>

<script>
const W = document.getElementById('world'), VP = document.getElementById('viewport');
const OV = document.getElementById('overlay');
let GAME = null;                 // game descriptor from /api/state (map, grid, sides…)
let MAPW = 0, MAPH = 0, CPX = 75;
let HX = 64, HXC = 32, HYH = 59.5;   // hex polygon geometry, derived from the grid
let scale = 0.25, panX = 0, panY = 0;
let units = [], mySide = null, selected = null, legal = null, dragging = null;
let FLOW = null;                 // strategic-gate flow (turn, mover) when the game is gated

function apply() { W.style.transform = `translate(${panX}px,${panY}px) scale(${scale})`; }
let toastT = null;
function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.style.display = 'block';
  clearTimeout(toastT); toastT = setTimeout(() => t.style.display = 'none', 6000);
}
function fitMap() {   // open with the whole map visible, centered
  scale = Math.min(VP.clientWidth / MAPW, VP.clientHeight / MAPH);
  panX = (VP.clientWidth - MAPW * scale) / 2;
  panY = (VP.clientHeight - MAPH * scale) / 2;
  apply();
}

// ---------- pan & zoom ----------
let panDrag = null;
VP.addEventListener('pointerdown', e => {
  if (e.target.closest('.counter')) return;
  panDrag = {x:e.clientX-panX, y:e.clientY-panY}; VP.setPointerCapture(e.pointerId);
});
VP.addEventListener('pointermove', e => {
  if (dragging) return dragMove(e);
  if (panDrag) { panX = e.clientX-panDrag.x; panY = e.clientY-panDrag.y; apply(); }
});
VP.addEventListener('pointerup', e => { if (dragging) dragEnd(e); panDrag = null; });
VP.addEventListener('wheel', e => {
  e.preventDefault();
  const f = e.deltaY < 0 ? 1.15 : 1/1.15, ns = Math.min(1.6, Math.max(0.10, scale*f));
  panX = e.clientX - (e.clientX-panX)*(ns/scale);
  panY = e.clientY - (e.clientY-panY)*(ns/scale);
  scale = ns; apply();
}, {passive:false});
const toMap = e => { const r = W.getBoundingClientRect();
                     return {x:(e.clientX-r.left)/scale, y:(e.clientY-r.top)/scale}; };

// ---------- game boot (everything game-specific arrives with the state) ----------
function bootGame(g) {
  GAME = g;
  MAPW = g.map_w; MAPH = g.map_h; CPX = g.counter_px;
  if (g.grid.orient === 'pointy') {
    // pointy-top: size = dy/1.5; corners at (0,±size),(±dx/2,±size/2)
    HX = g.grid.dy / 1.5; HXC = HX / 2; HYH = g.grid.dx / 2;
  } else {
    // flat-top: size = dx/1.5; corners at (±size,0),(±size/2,±dy/2)
    HX = g.grid.dx / 1.5; HXC = HX / 2; HYH = g.grid.dy / 2;
  }
  document.getElementById('gamename').textContent = g.name.toUpperCase();
  document.title = g.name + ' — Claude Plays VASSAL';
  document.querySelector('img.map').src = g.map_url;
  const SB = document.getElementById('sidebtns');
  SB.innerHTML = '';
  g.sides.forEach(s => {
    const b = document.createElement('button');
    b.className = 'sidebtn'; b.id = 'side-' + s.id; b.textContent = s.label;
    b.onclick = () => {
      mySide = s.id; deselect();
      SB.querySelectorAll('.sidebtn').forEach(x => x.classList.remove('on'));
      b.classList.add('on');
      render();
    };
    SB.appendChild(b);
  });
  if (!mySide) { mySide = g.sides[0].id; }
  document.getElementById('side-' + mySide).classList.add('on');
  fitMap();
}

// ---------- state ----------
async function refresh() {
  const s = await (await fetch('/api/state')).json();
  if (!GAME) bootGame(s.game);
  else GAME.tier = s.game.tier;      // active tier can change on reset
  units = s.units;
  FLOW = s.flow || null;
  renderTierBtn();
  document.getElementById('note').textContent = s.notes;
  OV.setAttribute('width', MAPW); OV.setAttribute('height', MAPH);
  if (!combatActive()) clearBattleSel();
  renderFlow();
  renderArrivals();
  renderCombat();
  renderRules();
  render();
}

function renderFlow() {
  const fb = document.getElementById('flowbar'), ep = document.getElementById('endphasebtn');
  const ai = document.getElementById('aictl');
  if (!FLOW) { fb.style.display = 'none'; ep.style.display = 'none'; ai.style.display = 'none'; return; }
  fb.style.display = ''; ep.style.display = '';
  // the AI opponent is a Tier-3 feature: offered at the start of a player turn.
  // Stepped (grognard) or animated auto-play, engine-driven one action at a time.
  const aiOK = (!FLOW.over && FLOW.phase === 'movement' && FLOW.arrivals
    && GAME && GAME.tier && GAME.tier.active >= 3);
  ai.style.display = aiOK ? 'inline-flex' : 'none';
  if (aiOK) document.getElementById('aiplaybtn').textContent =
    aiActive ? '■ stop' : ('▶ Play ' + sideLabel(FLOW.mover) + '’s turn');
  fb.textContent = FLOW.over
    ? `GAME OVER after ${FLOW.turn - 1} turns`
    : `${FLOW.turn_label || ('turn ' + FLOW.turn)} — ${sideLabel(FLOW.mover)} moves`
      + (FLOW.overstacked && FLOW.overstacked.length
         ? `  ⚠ overstacked: ${FLOW.overstacked.join(' ')}` : '');
}

function sideLabel(id) { const s = GAME.sides.find(s => s.id === id); return s ? s.label : id; }

// ---------- unit tooltip (hover; pinned while a unit is selected) ----------
const TIP = document.getElementById('tip');
const CLS_LABEL = { supply:'Supply unit (non-combat)', hq:'HQ (non-combat)',
                    markers:'Status marker' };
function tipHTML(u) {
  let h = `<b>${u.name}</b><br><span class="dim">${sideLabel(u.side)} — ${
           CLS_LABEL[u.cls] || 'Combat unit'}</span>`;
  if (u.cls !== 'markers')
    h += `<br>Attack ${u.att} · Defense ${u.dfn} · Movement ${u.ma}`;
  if (u.onmap && u.status !== 'at sea' && u.status !== 'reserve')
    h += `<br><span class="dim">Hex</span> ${u.hexname || u.hexnum}`
       + (u.terrain ? ` <span class="dim">(${u.terrain})</span>` : '');
  if (u.status === 'reserve')
    h += `<br><span style="color:#e0a34e">Off-board reinforcement${
          u.due ? ' — due ' + u.due : ''}</span>`;
  else if (u.status === 'at sea')
    h += `<br><span style="color:#7cb6e0">At sea${
          u.must_land ? ' — must land this turn or be eliminated' : ''}</span>`;
  else if (u.status)
    h += `<br><span class="dim">${u.status} this turn</span>`;
  return h;
}
function moveTip(x, y) {
  TIP.style.bottom = '';
  const r = TIP.getBoundingClientRect();
  TIP.style.left = Math.min(x + 14, innerWidth - r.width - 8) + 'px';
  TIP.style.top = Math.min(y + 14, innerHeight - r.height - 8) + 'px';
}
function showTip(u, x, y) { TIP.innerHTML = tipHTML(u); TIP.style.display = 'block'; moveTip(x, y); }
function pinTip() {          // selected unit's card sits above the action bar
  if (!selected) return;
  TIP.innerHTML = tipHTML(selected); TIP.style.display = 'block';
  TIP.style.left = '14px'; TIP.style.top = ''; TIP.style.bottom = '64px';
}
function hideTip() { if (selected) pinTip(); else TIP.style.display = 'none'; }

// ---------- arrivals / supply / sea panel (strategic gate) ----------
async function sgAction(action, side) {
  const r = await (await fetch('/api/sg_action', {method:'POST',
    body: JSON.stringify({action, side})})).json();
  if (r.error) toast('Gate: ' + r.error);
  else if (r.result && (r.result.result || r.result.note))
    toast(r.result.result || r.result.note);
  refresh();
}
function renderArrivals() {
  const box = document.getElementById('arrivals');
  const A = FLOW && FLOW.arrivals;
  if (!A || FLOW.over) { box.style.display = 'none'; return; }
  const S = A.supply;
  let h = `<b>${sideLabel(FLOW.mover)} — arrivals & sea</b><br>`;
  h += `<span style="color:#9aa3ad">controlled ports: ${
        A.ports.length ? A.ports.map(p => p.name).join(', ') : 'NONE (4.3: occupy to control)'}</span><br>`;
  if (!A.placements_open)
    h += `<span style="color:#e0a34e">movement has begun — placements closed [3.1/3.3]</span><br>`;
  h += `<div style="margin-top:6px"><b>Supply</b> ${S.on_board}/${S.max} on board, ${S.pool} off board`;
  if (S.can_roll)
    h += ` <button class="sidebtn" onclick='sgAction({type:"roll_supply"})'>Roll Supply Table (sunk on ${S.sunk_on.join(",")})</button>`;
  if (S.pending && A.placements_open && A.ports.length)
    h += '<br>' + A.ports.map(p =>
      `<button class="sidebtn" onclick='sgAction({type:"land_supply",port:[${p.hex}]})'>Land supply: ${p.name}</button>`).join(' ');
  h += `</div>`;
  if (A.due.length) {
    h += `<div style="margin-top:6px"><b>Reinforcements due</b> (19.2: land before moving)<br>`;
    A.due.forEach(d => {
      h += `<div style="margin:2px 0">${d.slot} <i style="color:#9aa3ad">(${d.due})</i> `;
      if (A.placements_open && A.ports.length)
        h += A.ports.map(p =>
          `<button class="sidebtn" onclick='sgAction({type:"land_reinforcement",unit:"${d.pid}",port:[${p.hex}]})'>${p.name}</button>`).join(' ');
      h += `</div>`;
    });
    h += `</div>`;
  }
  if (A.at_sea.length) {
    h += `<div style="margin-top:6px"><b>At sea</b><br>`;
    A.at_sea.forEach(u => {
      h += `<div style="margin:2px 0">${u.slot}${u.must_land ?
            ' <span style="color:#e06c5e">must land NOW or be eliminated [23.42]</span>' : ''} `;
      if (u.must_land && A.placements_open)
        h += A.ports.map(p =>
          `<button class="sidebtn" onclick='sgAction({type:"debark",unit:"${u.pid}",port:[${p.hex}]})'>Land: ${p.name}</button>`).join(' ');
      h += `</div>`;
    });
    h += `</div>`;
  }
  const R = A.replacements;
  if (R && (R.points || R.dead.length)) {
    h += `<div style="margin-top:6px"><b>Replacements</b> — ${R.points} attack `
       + `factor(s) banked [20.5]`;
    if (A.placements_open && A.ports.length) {
      R.dead.filter(d => d.cost <= R.points).forEach(d => {
        h += `<div style="margin:2px 0">${d.slot} <span class="dim">(cost ${d.cost})</span> `
           + A.ports.map(p =>
             `<button class="sidebtn" onclick='sgAction({type:"replace",unit:"${d.pid}",port:[${p.hex}]})'>${p.name}</button>`).join(' ')
           + `</div>`;
      });
    }
    h += `</div>`;
  }
  h += `<div style="margin-top:6px;color:#9aa3ad">selected unit at a port? `
     + `<button class="sidebtn" onclick='selected ? sgAction({type:"embark",unit:selected.id}) : toast("select a unit first")'>Put out to sea [23.4]</button>`
     + ` · selected supply? <button class="sidebtn" onclick='selected && selected.cls==="supply" ? sgAction({type:"destroy_supply",unit:selected.id}) : toast("select one of your supply units")'>Destroy [15.4]</button></div>`;
  box.innerHTML = h; box.style.display = '';
}

// ---------- combat panel (Tier 2: battles through the gate) ----------
let atkSel = new Set(), defSel = new Set(), PREV = null, supplySel = null;
function combatActive() {
  return FLOW && FLOW.combat && FLOW.combat.phase === 'combat' && !FLOW.over;
}
function clearBattleSel() { atkSel.clear(); defSel.clear(); PREV = null; supplySel = null; }
async function previewBattle() {
  PREV = null;
  if (atkSel.size && defSel.size) {
    PREV = await (await fetch(`/api/battle_preview?atk=${[...atkSel].join(',')}&def=${[...defSel].join(',')}`)).json();
  }
  renderCombat(); render();
}
function toggleBattle(u, stack) {
  const C = FLOW.combat;
  if (C.pending || C.pending_rommel) { toast('settle the pending battle first [8.6]'); return; }
  if (u.cls || !u.onmap || u.status === 'eliminated' || u.status === 'reserve' || u.status === 'at sea') return;
  // a click toggles the whole same-side combat stack (11.4/11.5 splits stay
  // legal through the gate/API; the panel just doesn't offer them yet)
  const mates = (stack || [u]).filter(s => s.side === u.side && !s.cls && s.onmap
                                      && s.status !== 'eliminated');
  const set = u.side === FLOW.mover ? atkSel : defSel;
  const on = set.has(u.id);
  mates.forEach(m => on ? set.delete(m.id) : set.add(m.id));
  previewBattle();
}
async function resolveBattle() {
  const a = {type:'battle', attackers:[...atkSel], defenders:[...defSel]};
  if (supplySel) a.supply = supplySel;
  clearBattleSel();
  await sgAction(a);
}
function unitById(id) { return units.find(u => u.id === id); }
function chips(set) {
  return [...set].map(id => { const u = unitById(id); return u ? u.name : id; }).join(', ') || '—';
}
function renderCombat() {
  const box = document.getElementById('combat');
  const C = FLOW && FLOW.combat;
  if (!C || FLOW.over) { box.style.display = 'none'; return; }
  if (C.phase === 'movement') {
    const obligations = C.must_attack.length || C.must_be_attacked.length
                        || (C.av_offers && C.av_offers.length) || (C.av && C.av.length);
    if (!obligations) { box.style.display = 'none'; return; }
    let hm = `<b>${sideLabel(FLOW.mover)} — combat is coming</b><br>
      <span class="dim">moving into an enemy ZOC causes combat [7.2]; battles resolve
      after ALL movement [5.3]</span><br>
      must attack: ${C.must_attack.map(u=>u.slot).join(', ') || '—'}<br>
      must be attacked: ${C.must_be_attacked.map(u=>u.slot).join(', ') || '—'}<br>`;
    if (C.av && C.av.length)
      hm += `<div style="margin-top:4px;color:#e0c34e">AV declared: ${
             C.av.map(e => e.defenders.map(d=>d.slot).join('+')).join('; ')} —
             ZOC negated, resolve in the combat portion [9.1]</div>`;
    (C.av_offers || []).forEach(o => {
      hm += `<button class="sidebtn" onclick='sgAction({type:"declare_av",defender:"${o.defender}",attackers:${JSON.stringify(o.attackers)},supply:"${o.supply}"})'>
             ⚡ AUTOMATIC VICTORY vs ${o.slot} @ ${o.hexname} (${o.odds}) [9.1]</button> `;
    });
    hm += `<br><button class="sidebtn" onclick='sgAction({type:"end_movement"})'>End movement — resolve battles [3.2]</button>`;
    box.innerHTML = hm; box.style.display = ''; return;
  }
  let h = `<b>${sideLabel(FLOW.mover)} — combat [3.2/3.4]</b><br>`;
  if (C.pending_rommel) {
    const pr = C.pending_rommel, u = unitById(pr.unit);
    h += `<div style="margin-top:6px"><b>${u ? u.name : pr.unit}</b> is alone in an enemy

      h += `<div style="margin:4px 0"><b>${u.slot}</b><br>`;
      if (u.options.length)

    h += `<div style="margin-top:6px"><b>Exchange</b> — the <b>${sideLabel(P.winner)}</b> player removes

    P.advancers.forEach(u => {
      P.hexes.forEach((hx, i) => {
        h += `<button class="sidebtn" onclick='sgAction({type:"advance",unit:"${u.pid}",hex:[${hx}]})'>${u.slot} → ${P.hex_names[i]}</button> `;
      });
    });
    h += `</div>`;
  } else {
    h += `<span class="dim">click your units, then enemy units, to build a battle
          — each attacker must be adjacent to every defender [8.5]</span><br>
          <b>Attackers:</b> ${chips(atkSel)}<br><b>Defenders:</b> ${chips(defSel)}<br>`;
    if (PREV) {
      if (PREV.odds) h += `odds <b>${PREV.odds}</b> (${PREV.factors[0]} vs ${PREV.factors[1]}${PREV.column==='auto_elim' ? ' — automatic elimination, no roll' : ''})<br>`;
      if (PREV.legal || PREV.needs_supply) {
        if (PREV.needs_supply) {
          const sups = units.filter(u => u.cls==='supply' && u.side===FLOW.mover && u.onmap
                                    && !['eliminated','reserve','at sea'].includes(u.status));
          h += `1-2 or better needs supply [14.1]: <select id="supsel" onchange="supplySel=this.value">
                <option value="">— pick supply —</option>` +
               sups.map(s => `<option value="${s.id}" ${supplySel===s.id?'selected':''}>${s.name}</option>`).join('') +
               `</select><br>`;
        }
        h += `<button class="sidebtn" onclick="resolveBattle()">⚔ Resolve battle</button>`;
      } else if (PREV.reasons && PREV.reasons.length) {
        h += `<span style="color:#e08c7c">${PREV.reasons[0]}</span>`;
      }
      h += `<br>`;
    }
    h += `<div style="margin-top:6px">must attack: ${C.must_attack.map(u=>u.slot).join(', ') || '<span class="dim">all done</span>'}<br>
          must be attacked: ${C.must_be_attacked.map(u=>u.slot).join(', ') || '<span class="dim">all done</span>'}</div>`;
    if (C.must_attack.length && !C.battles_fought)
      h += `<div style="margin-top:4px" class="dim">a unit with NO legal attack (worse than 1-6
            even alone) is eliminated before any battle:</div>` +
           C.must_attack.map(u =>
             `<button class="sidebtn" onclick='sgAction({type:"forced_elim",unit:"${u.pid}"})'>${u.slot}: forced elim [7.4]</button>`).join(' ');
    if (C.substitutes && C.substitutes.available.length) {
      h += `<div style="margin-top:6px"><b>Substitutes</b> [21.1/21.2] — select
            same-hex units (click them), then:`;
      C.substitutes.available.forEach(sb => {
        h += ` <button class="sidebtn" onclick='sgAction({type:"substitute",units:[...atkSel],sub:"${sb.pid}"})'>${sb.slot} (${sb.att})</button>`;
      });
      h += `<span class="dim"> · breakdown via the API (stock: ${C.substitutes.stock})</span></div>`;
    }
    h += `<div style="margin-top:8px"><span class="dim">all obligations discharged?</span>
          use <b>End player turn</b> in the top bar</div>`;
  }
  box.innerHTML = h; box.style.display = '';
}
function submitExchange(winner) {
  const ids = [...document.querySelectorAll('.exch:checked')].map(c => c.value);
  if (!ids.length) { toast('pick the units to remove'); return; }
  sgAction({type:'exchange_loss', units: ids}, winner);
}

function render() {
  document.querySelectorAll('.counter,.badge').forEach(n => n.remove());
  const byhex = {};
  units.forEach(u => { if (u.status !== 'eliminated') (byhex[u.hexnum] = byhex[u.hexnum]||[]).push(u); });
  for (const h in byhex) byhex[h].forEach((u, i) => {
    const el = document.createElement('img');
    el.className = 'counter' + (u.status ? ' done' : '') + (selected && selected.id===u.id ? ' sel' : '');
    el.src = GAME.counters_url + encodeURIComponent(u.img || (u.name + '.png'));
    el.style.width = CPX + 'px'; el.style.height = CPX + 'px';
    el.style.margin = `-${CPX/2}px 0 0 -${CPX/2}px`;
    el.style.left = (u.x + i*14) + 'px'; el.style.top = (u.y - i*14) + 'px';
    el.style.zIndex = 10 + i;
    el.dataset.id = u.id;
    if (atkSel.has(u.id)) el.style.outline = '4px solid #e05a4e';
    else if (defSel.has(u.id)) el.style.outline = '4px solid #4e9de0';
    if (u.facing !== null && u.facing !== undefined && GAME.facing)
      el.style.transform = `rotate(${(GAME.facing.offset_deg||0) + u.facing * GAME.facing.step_deg}deg)`;
    el.addEventListener('pointerenter', ev => { if (!dragging) showTip(u, ev.clientX, ev.clientY); });
    el.addEventListener('pointermove', ev => { if (!dragging) moveTip(ev.clientX, ev.clientY); });
    el.addEventListener('pointerleave', hideTip);
    el.addEventListener('pointerdown', ev => onCounterDown(ev, u, byhex[h]));
    el.addEventListener('contextmenu', ev => onCounterMenu(ev, u));
    W.appendChild(el);
    if (i === byhex[h].length-1 && byhex[h].length > 1) {
      const b = document.createElement('div');
      b.className = 'badge'; b.textContent = 'x' + byhex[h].length;
      b.style.left = u.x + 'px'; b.style.top = (u.y + 14) + 'px';
      W.appendChild(b);
    }
  });
  const mine = units.filter(u => u.side===mySide && u.onmap && u.ma > 0
                                 && u.status !== 'reserve');
  const doneN = mine.filter(u => u.status).length;
  document.getElementById('progress').textContent =
    `${sideLabel(mySide)} movement: ${doneN} / ${mine.length} units done`;
  drawOverlay();
}

// ---------- hex highlight overlay ----------
const hexCorners = (x,y) => GAME.grid.orient === 'pointy'
  ? [[x,y-HX],[x+HYH,y-HXC],[x+HYH,y+HXC],[x,y+HX],[x-HYH,y+HXC],[x-HYH,y-HXC]]
  : [[x-HX,y],[x-HXC,y-HYH],[x+HXC,y-HYH],[x+HX,y],[x+HXC,y+HYH],[x-HXC,y+HYH]];
const hexPts = (x,y) => hexCorners(x,y).map(p => p.join(',')).join(' ');
function drawOverlay() {
  OV.innerHTML = '';
  if (!legal) return;
  if (legal.free) return;   // free play: no gate, no highlights — drop anywhere
  // dim everything except legal hexes + origin: evenodd path with hex holes
  let d = `M0 0 H${OV.getAttribute('width')} V${OV.getAttribute('height')} H0 Z `;
  const hole = (x,y) => 'M' + hexCorners(x,y).map(q=>q.join(' ')).join(' L ') + ' Z ';
  legal.dests.forEach(h => d += hole(h.x, h.y));
  d += hole(selected.x, selected.y);
  const path = document.createElementNS('http://www.w3.org/2000/svg','path');
  path.setAttribute('d', d); path.setAttribute('fill','rgba(0,0,0,0.62)'); path.setAttribute('fill-rule','evenodd');
  OV.appendChild(path);
  legal.dests.forEach(h => {
    const pg = document.createElementNS('http://www.w3.org/2000/svg','polygon');
    pg.setAttribute('points', hexPts(h.x, h.y));
    pg.setAttribute('fill','rgba(120,220,120,0.18)'); pg.setAttribute('stroke','#7ce07c');
    pg.setAttribute('stroke-width','4');
    OV.appendChild(pg);
    if (h.cost !== undefined) {   // MP spent to reach this hex
      const tx = document.createElementNS('http://www.w3.org/2000/svg','text');
      tx.setAttribute('x', h.x); tx.setAttribute('y', h.y + 46);
      tx.setAttribute('text-anchor','middle'); tx.setAttribute('font-size','24');
      tx.setAttribute('fill','#1d5c1d'); tx.setAttribute('font-weight','bold');
      tx.textContent = h.cost;
      OV.appendChild(tx);
    }
  });
}

// ---------- selection / picker ----------
function onCounterDown(ev, u, stackUnits) {
  ev.stopPropagation();
  if (combatActive()) { toggleBattle(u, stackUnits); return; }
  if (selected && selected.id === u.id && legal) { dragStart(ev, u); return; }
  // free play (no gate): any of your pieces is draggable — markers, track
  // pieces off the playable map, zero-MA units included (VASSAL parity)
  if (u.side !== mySide || u.status) return;
  if (FLOW && (!u.onmap || u.ma === 0)) return;
  const eligible = FLOW
    ? stackUnits.filter(s => s.side===mySide && !s.status && s.ma>0)
    : stackUnits.filter(s => s.side===mySide && !s.status);
  if (eligible.length > 1) showPicker(ev, eligible);
  else select(u, false, ev);
}
function showPicker(ev, stackUnits) {
  const P = document.getElementById('picker');
  P.innerHTML = `<div class="hdr">Stack at ${stackUnits[0].hexnum} — pick one, or move together</div>`;
  stackUnits.forEach(u => {
    const d = document.createElement('div'); d.className = 'item';
    d.innerHTML = `<img src="${GAME.counters_url}${encodeURIComponent(u.img || (u.name + '.png'))}"> ${u.name} <span style="color:#8a8f98">[${u.att}-${u.dfn}-${u.ma}]</span>`;
    d.onclick = e => { P.style.display='none'; select(u, false, e); };
    P.appendChild(d);
  });
  const w = document.createElement('div'); w.className = 'item';
  w.innerHTML = `<b>▣ Whole stack (${stackUnits.length} units, slowest MA)</b>`;
  w.onclick = e => { P.style.display='none'; select(stackUnits[0], true, e); };
  P.appendChild(w);
  P.style.left = Math.min(ev.clientX+8, innerWidth-240) + 'px'; P.style.top = ev.clientY+8 + 'px';
  P.style.display = 'block';
}
async function select(u, whole, ev) {
  selected = u; selected.whole = whole;
  legal = await (await fetch(`/api/legal?id=${u.id}&whole=${whole?1:0}`)).json();
  render();
  pinTip();
  const A = document.getElementById('actions');
  if (legal.reasons && legal.reasons.length && !legal.dests.length) {
    A.innerHTML = `<b>${u.name}</b> — <span style="color:#e08c7c">${legal.reasons.join('; ')}</span>
                   <button class="sidebtn" onclick="deselect()">OK</button>`;
  } else if (legal.free) {
    A.innerHTML = `<b>${whole ? 'STACK @ '+u.hexnum : u.name}</b> — free play:
                   drag anywhere on the board (you are the umpire).
                   <button class="sidebtn" onclick="passSel()">Pass</button>
                   <button class="sidebtn" onclick="deselect()">Cancel</button>`;
  } else {
    A.innerHTML = `<b>${whole ? 'STACK @ '+u.hexnum : u.name}</b> — MA ${legal.ma}, ${legal.dests.length} legal hexes.
                   Drag to a green hex. <button class="sidebtn" onclick="passSel()">Pass</button>
                   <button class="sidebtn" onclick="deselect()">Cancel</button>`;
  }
  A.style.left = '14px'; A.style.bottom = '14px'; A.style.top = ''; A.style.display = 'block';
}
function deselect() { selected = null; legal = null;
  TIP.style.display = 'none';
  document.getElementById('actions').style.display = 'none'; render(); }
async function passSel() {
  await fetch('/api/pass', {method:'POST', body:JSON.stringify({id:selected.id, whole:selected.whole})});
  deselect(); refresh();
}
document.addEventListener('pointerdown', e => {
  if (!e.target.closest('#picker')) document.getElementById('picker').style.display='none';
});

// ---------- facing (right-click menu; tactical games only) ----------
function onCounterMenu(ev, u) {
  ev.preventDefault(); ev.stopPropagation();
  if (!GAME.facing || u.side !== mySide) return;
  const P = document.getElementById('picker');
  const deg = GAME.facing.step_deg, off = GAME.facing.offset_deg || 0;
  P.innerHTML = `<div class="hdr">${u.name} — facing ${off + (u.facing||0)*deg}&deg; (hexside ${(u.facing||0)+1} of ${GAME.facing.count})</div>`;
  [['&#8635; Rotate CW', 1], ['&#8634; Rotate CCW', -1]].forEach(([label, step]) => {
    const d = document.createElement('div'); d.className = 'item';
    d.innerHTML = label;
    d.onclick = async () => {
      P.style.display = 'none';
      await fetch('/api/face', {method:'POST', body:JSON.stringify({id:u.id, step})});
      refresh();
    };
    P.appendChild(d);
  });
  const c = document.createElement('div'); c.className = 'item';
  c.innerHTML = 'Cancel';
  c.onclick = () => { P.style.display = 'none'; };
  P.appendChild(c);
  P.style.left = Math.min(ev.clientX+8, innerWidth-240) + 'px'; P.style.top = ev.clientY+8 + 'px';
  P.style.display = 'block';
}
document.addEventListener('contextmenu', e => {
  if (e.target.closest('.counter')) e.preventDefault();
});

// ---------- drag restricted to legal hexes ----------
function dragStart(ev, u) {
  const el = document.querySelector(`.counter[data-id="${u.id}"]`);
  dragging = {u, el}; el.classList.add('dragging');
  TIP.style.display = 'none';
  ev.stopPropagation();
}
function dragMove(e) {
  const m = toMap(e);
  dragging.el.style.left = m.x+'px'; dragging.el.style.top = m.y+'px';
  // live snap preview: brighten nearest legal hex
  let best = nearestLegal(m);
  OV.querySelectorAll('polygon').forEach(p => p.setAttribute('stroke-width','4'));
  if (best) {
    const i = legal.dests.indexOf(best);
    const pg = OV.querySelectorAll('polygon')[i];
    if (pg) pg.setAttribute('stroke-width','12');
  }
}
function nearestLegal(m) {
  let best = null, bd = 70*70;   // must drop within ~70px of a legal hex center
  legal.dests.forEach(h => { const d=(h.x-m.x)**2+(h.y-m.y)**2; if (d<bd){bd=d;best=h;} });
  return best;
}
async function dragEnd(e) {
  const m = toMap(e), u = dragging.u;
  dragging.el.classList.remove('dragging'); dragging = null;
  const best = nearestLegal(m);
  if (!best) { render(); return; }   // illegal drop -> snap back, nothing written
  const r = await (await fetch('/api/move', {method:'POST',
      body:JSON.stringify({id:u.id, dest:best.hexnum, whole:selected.whole})})).json();
  if (r.error) toast('Gate: ' + r.error);
  deselect(); refresh();
}

// ---------- tier selection (engine-level: run at or below the earned tier) ----------
let tierArm = null;   // choice awaiting its confirming second click
function renderTierBtn() {
  const B = document.getElementById('tierbtn'), T = GAME && GAME.tier;
  if (!T || T.choices.length < 2) { B.style.display = 'none'; return; }
  B.style.display = '';
  B.textContent = `Tier ${T.active} of ${T.earned} ▾`;
  B.classList.toggle('on', document.getElementById('tierpanel').style.display === 'block');
}
function renderTierPanel() {
  const P = document.getElementById('tierpanel'), T = GAME.tier;
  let h = `<b>Engine enforcement tier</b>
           <div class="dim" style="margin:4px 0 8px">This game has earned
           <b>Tier ${T.earned}</b>. You may run it at any tier up to that badge —
           lower tiers switch validated rule systems OFF and hand them to you,
           the umpire. Changing tier starts a NEW game.</div>`;
  T.choices.forEach(c => {
    const active = c === T.active, armed = tierArm === c;
    h += `<div class="tierrow" data-t="${c}" style="padding:6px 8px; margin:3px 0;
            border-radius:6px; cursor:${active?'default':'pointer'};
            border:1px solid ${active?'#3a6ea5':armed?'#e0a34e':'#3a3f47'};
            background:${active?'#2b3f55':'#2c2f36'}">
            ${T.labels[c] || ('Tier ' + c)}
            ${active ? ' <span style="color:#9fc27f">— ACTIVE</span>'
                     : armed ? ' <span style="color:#e0a34e">— click again to restart at this tier</span>' : ''}
          </div>`;
  });
  P.innerHTML = h;
  P.querySelectorAll('.tierrow').forEach(el => el.onclick = async () => {
    const c = +el.dataset.t;
    if (c === GAME.tier.active) return;
    if (tierArm !== c) { tierArm = c; renderTierPanel(); return; }
    tierArm = null;
    const r = await (await fetch('/api/reset', {method:'POST',
      body: JSON.stringify({tier: c})})).json();
    if (r.error) { toast(r.error); return; }
    location.reload();   // tier decides which client the server serves
  });
}
document.getElementById('tierbtn').onclick = () => {
  const P = document.getElementById('tierpanel');
  const open = P.style.display === 'block';
  P.style.display = open ? 'none' : 'block';
  tierArm = null;
  if (!open) renderTierPanel();
  renderTierBtn();
};

  const SD = GAME && GAME.source_defects;
  if (SD && SD.list && SD.list.length) {
    h += `<div style="color:#c99ae0;font-weight:600">Defects found in the printed game — and how the engine resolves them</div>
          <div class="dim" style="margin:4px 0 6px">Encoding a game is a formal check of its own
          rulebook. These are defects of the ORIGINAL published game (editing errors,
          contradictions, undefined cases), each with the resolution this engine enforces and
          the authority for that resolution.</div><ul>`;
    SD.list.forEach(d => {
      h += `<li><b>${d.defect}</b> <span class="dim">[${d.kind}; rules ${d.rules.join(', ')}]</span><br>
            <span style="color:#9fc27f">Resolved:</span> ${d.resolution}<br>
            <span class="dim">Authority: ${d.authority}</span></li>`;
    });
    h += `</ul>`;
  }
  P.innerHTML = h;
}
document.getElementById('rulesbtn').onclick = () => {
  const P = document.getElementById('rulespanel');
  const open = P.style.display === 'block';
  P.style.display = open ? 'none' : 'block';
  document.getElementById('rulesbtn').classList.toggle('on', !open);
  renderRules();
};

// ---------- tables panel (transcribed CRT / to-hit — the data the gate uses) ----------
function esc(s){ return String(s).replace(/[&<>]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[c])); }
async function renderTables() {
  const P = document.getElementById('tablespanel');
  if (P.style.display !== 'block') return;
  P.innerHTML = `<b>Game tables</b><div class="cite">Loading…</div>`;
  let tables = [];
  try { tables = (await (await fetch('/api/tables')).json()).tables || []; }
  catch(e) { P.innerHTML = `<b>Game tables</b><div class="cite">Could not load tables.</div>`; return; }
  let h = `<b>Game tables</b><div class="cite">Transcribed from the rulebook and cited — the
           same data the engine resolves combat on, not scanned images.</div>`;
  if (!tables.length)
    h += `<div class="dim" style="margin-top:6px">This game has no encoded combat tables
          (Tier 0/1, or none applicable).</div>`;
  for (const t of tables) {
    h += `<h3>${esc(t.title)}</h3>`;
    if (t.cite) h += `<div class="cite">${esc(t.cite)}</div>`;
    h += `<div style="overflow-x:auto"><table><thead><tr>`;
    t.columns.forEach(c => h += `<th>${esc(c)}</th>`);
    h += `</tr></thead><tbody>`;
    t.rows.forEach(r => { h += `<tr>`; r.forEach(c => h += `<td>${esc(c)}</td>`); h += `</tr>`; });
    h += `</tbody></table></div>`;
    if (t.legend && t.legend.length) {
      h += `<div class="legend">`;
      t.legend.forEach(l => h += `<div><code>${esc(l.code)}</code>${esc(l.text)}</div>`);
      h += `</div>`;
    }
    if (t.notes && t.notes.length) {
      h += `<ul class="notes">`;
      t.notes.forEach(n => h += `<li>${esc(n)}</li>`);
      h += `</ul>`;
    }
  }
  P.innerHTML = h;
}
document.getElementById('tablesbtn').onclick = () => {
  const P = document.getElementById('tablespanel');
  const open = P.style.display === 'block';
  P.style.display = open ? 'none' : 'block';
  document.getElementById('tablesbtn').classList.toggle('on', !open);
  renderTables();
};

// ---------- top bar ----------
document.getElementById('resetbtn').onclick = async () => {
  await fetch('/api/reset', {method:'POST'}); deselect(); refresh();
};
document.getElementById('endphasebtn').onclick = async () => {
  const r = await (await fetch('/api/end_phase', {method:'POST', body:'{}'})).json();
  if (r.error) toast('Gate: ' + r.error);
  deselect(); refresh();
};
// ---------- stepped / animated AI (engine-driven, one action at a time) ----------
// Every StrategicGame with a policy AI gets this from the engine's TurnStepper:
// /api/ai_step reveals the next action's intent, then executes it. Stepped mode
// waits for SPACE (grognards approve each move); auto mode plays on a timer until
// the turn ends — either way you watch the turn unfold counter by counter instead
// of jump-cutting from turn-start to turn-end.
let aiBusy = false, aiActive = false, aiNext = null;

function showThinking(on) {
  document.getElementById('aithinking').style.display = on ? '' : 'none';
}
function drawAIIntent(nx) {
  [...OV.querySelectorAll('.aimark')].forEach(e => e.remove());
  if (!nx || !nx.action) return;
  const a = nx.action;
  const ring = (x, y, color) => {
    const pg = document.createElementNS('http://www.w3.org/2000/svg', 'polygon');
    pg.setAttribute('points', hexPts(x, y)); pg.setAttribute('class', 'aimark');
    pg.setAttribute('fill', 'none'); pg.setAttribute('stroke', color);
    pg.setAttribute('stroke-width', '6'); OV.appendChild(pg);
  };
  const actor = units.find(u => u.id === a.unit
                 || (a.attackers && a.attackers.includes(u.id)));
  if (actor) ring(actor.x, actor.y, '#ffd75e');                 // acting unit: yellow
  (a.defenders || []).forEach(dp => {                            // battle targets: red
    const d = units.find(u => u.id === dp); if (d) ring(d.x, d.y, '#ff6a5e');
  });
}
async function aiStepOnce() {
  if (aiBusy) return { done: true };
  aiBusy = true; showThinking(true);
  let r;
  try {
    r = await (await fetch('/api/ai_step', { method: 'POST', body: '{}' })).json();
  } catch (e) { aiBusy = false; showThinking(false); toast('AI step failed: ' + e); return { done: true }; }
  aiBusy = false; showThinking(false);
  if (r.error) { toast('Gate: ' + r.error); return { done: true }; }
  if (r.flow) FLOW = r.flow;
  if (r.step) await refresh();          // an action executed — board reflects it
  aiNext = r.next; drawAIIntent(aiNext);
  if (r.step) {
    const v = r.step.verdict, bad = v && !v.legal;
    if (bad) toast('Gate rejected: ' + (v.reasons || []).join('; '));
  }
  if (r.done) { aiNext = null; drawAIIntent(null); await refresh(); }
  return r;
}
async function aiAutoLoop() {
  if (!aiActive) return;
  const r = await aiStepOnce();
  if (r.done || !aiActive) { aiActive = false; renderFlow(); return; }
  const pace = parseInt(document.getElementById('aipace').value);
  // pace only between EXECUTED actions; the initial reveal advances immediately
  setTimeout(aiAutoLoop, r.step ? pace : 0);
}
async function startAI() {
  if (aiActive) { aiActive = false; renderFlow(); return; }   // toggle: stop
  aiActive = true; renderFlow();
  document.getElementById('aiplaybtn').blur();   // so SPACE steps, not re-clicks the button
  if (document.getElementById('aimode').value === 'auto') {
    aiAutoLoop();
  } else {
    await aiStepOnce();                 // reveal the first intent; SPACE advances
  }
}
document.getElementById('aiplaybtn').onclick = startAI;
document.getElementById('aimode').onchange = () => {
  if (aiActive && document.getElementById('aimode').value === 'auto') aiAutoLoop();
};
document.addEventListener('keydown', e => {
  if (e.code !== 'Space') return;
  if (!aiActive || aiBusy) return;
  if (document.getElementById('aimode').value !== 'step') return;
  e.preventDefault();
  aiStepOnce().then(r => { if (r.done) { aiActive = false; renderFlow(); } });
});

refresh();
</script>
