<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>VALOR Engine</title>
<style>
  html,body { margin:0; height:100%; overflow:hidden; background:#16181c; font-family:Segoe UI,sans-serif; }
  /* Two FIXED rows, no wrapping: every control has a permanent pixel position
     (Bruce's rule — you must always know where each button is). Turn-state
     controls hide via visibility (frame.js .holdspace) so their slot never
     collapses; variable text sits in fixed-width .fixw cells. */
  #topbar { position:fixed; top:0; left:0; right:0; background:#22262c; color:#ddd;
            padding:4px 14px; z-index:50; font-size:14px;
            box-shadow:0 2px 8px rgba(0,0,0,.5); min-width:920px; }
  .tbrow { display:flex; align-items:center; flex-wrap:nowrap; gap:0 12px; height:37px; }
  #world.glide { transition: transform .35s ease; }
  .pulse { animation:pulseglow 1.2s ease-in-out infinite; background:#2c6e3a!important;
           border-color:#7ce07c!important; color:#fff!important; }
  @keyframes pulseglow { 0%,100% { box-shadow:0 0 0 0 rgba(120,224,120,0); }
                         50% { box-shadow:0 0 14px 4px rgba(120,224,120,.6); } }
  #zoomctl { position:fixed; right:354px; bottom:14px; z-index:48; display:flex; flex-direction:column; gap:6px; }
  #zoomctl button { width:40px; height:40px; border-radius:8px; border:1px solid #555;
                    background:#23262cee; color:#ddd; font-size:20px; cursor:pointer;
                    box-shadow:0 3px 10px rgba(0,0,0,.5); }
  #zoomctl button:hover { background:#3a6ea5; color:#fff; }
  #topbar b { color:#fff; }
  .chip { padding:3px 10px; border-radius:12px; background:#31363e; font-size:13px; }
  .chip.hot { background:#7a4b17; color:#ffd9a0; }
  .chip.brit { background:#3b4d2e; color:#cfe6b8; }
  .chip.axis { background:#54341f; color:#f0c9a8; }
  .sidebtn { padding:5px 12px; border-radius:5px; border:1px solid #555; background:#2c2f36;
             color:#ccc; cursor:pointer; font-size:13px; }
  .sidebtn.on { background:#3a6ea5; color:#fff; border-color:#6aa0d8; }
  .sidebtn.warn { background:#7a2f22; color:#ffd6cc; border-color:#a05040; }
  .sidebtn:disabled { opacity:.4; cursor:default; }
  #tablespanel { display:none; position:fixed; top:90px; right:8px; width:600px; max-width:60vw;
                 max-height:82vh; overflow:auto; background:#1d2025f5; color:#cfd3da;
                 font-size:13px; border:1px solid #3a3f47; border-radius:8px;
                 padding:10px 14px; z-index:92; box-shadow:0 6px 24px rgba(0,0,0,.6); }
  #tablespanel h3 { margin:10px 0 3px; font-size:14px; color:#fff; }
  #tablespanel .cite { color:#8a8f98; font-size:11.5px; margin-bottom:6px; }
  #tablespanel table { border-collapse:collapse; margin:4px 0 6px; font-variant-numeric:tabular-nums; }
  #tablespanel th, #tablespanel td { border:1px solid #3a3f47; padding:3px 7px; text-align:center; }
  #tablespanel th { background:#2c2f36; color:#c8d2dc; font-weight:600; }
  #tablespanel td:first-child, #tablespanel th:first-child { text-align:left; white-space:nowrap; color:#cdd6df; }
  #tablespanel .legend div { margin:2px 0; }
  #tablespanel .legend code { color:#ffd75e; font-weight:600; margin-right:6px; }
  #tablespanel .notes { color:#9aa3ad; font-size:12px; margin:2px 0 4px; padding-left:16px; }
  #tablespanel .notes li { margin:2px 0; }
  #viewport { position:absolute; top:82px; left:0; right:340px; bottom:0; overflow:hidden; cursor:grab; }
  #world { position:absolute; transform-origin:0 0; }
  #world img.map { display:block; user-select:none; -webkit-user-drag:none; }
  svg#overlay { position:absolute; top:0; left:0; pointer-events:none; }
  .counter { position:absolute; cursor:pointer; user-select:none; -webkit-user-drag:none; border-radius:4px; }
  .counter.acted { filter:grayscale(.55) brightness(.75); }
  .counter.dead { filter:grayscale(1) brightness(.45) sepia(.4); }
  .counter.sel { outline:3px solid #ffd75e; outline-offset:1px; z-index:30!important; }
  .counter.dragging { z-index:40!important; pointer-events:none; opacity:.85; }
  .dmg { position:absolute; z-index:32; pointer-events:none; font-weight:bold; font-size:34px;
         text-shadow:0 0 6px #000, 0 0 3px #000; }
  .tring { position:absolute; z-index:29; border-radius:50%; pointer-events:auto; cursor:crosshair;
           display:flex; align-items:center; justify-content:center; }
  .tring .lbl { background:rgba(0,0,0,.75); color:#9ee493; font-size:22px; padding:2px 10px;
                border-radius:10px; pointer-events:none; }
  .tring.illegal { cursor:not-allowed; }
  .tring.illegal .lbl { color:#e88; }
  #sidepanel { position:fixed; top:82px; right:0; width:340px; bottom:0; background:#1d2025;
               color:#cfd3da; display:flex; flex-direction:column; border-left:1px solid #333; }
  #scen { padding:8px 12px; font-size:12px; color:#8a8f98; border-bottom:1px solid #333; }
  #lastres { padding:8px 12px; border-bottom:1px solid #333; font-size:13px; max-height:230px; overflow-y:auto; }
  #lastres .die { display:inline-block; width:22px; height:22px; line-height:22px; text-align:center;
                  background:#efe9dc; color:#222; border-radius:4px; margin:0 2px; font-weight:bold; }
  #lastres .hit { color:#9ee493; font-weight:bold; }
  #lastres .miss { color:#888; }
  #loghdr { padding:6px 12px; font-size:12px; color:#8a8f98; border-bottom:1px solid #333; display:flex; justify-content:space-between; }
  #log { flex:1; overflow-y:auto; font-size:12px; padding:6px 8px; font-family:Consolas,monospace; }
  .le { padding:3px 6px; border-radius:4px; margin-bottom:3px; white-space:pre-wrap; word-break:break-word; }
  .le.legal { background:#202620; color:#b9d3ac; }
  .le.illegal { background:#2d1d1c; color:#e8a49b; border-left:3px solid #b0483a; }
  .le.event { background:#1d2430; color:#a9c4e8; }
  #actions { position:fixed; display:none; z-index:60; left:14px; bottom:14px; background:#23262c;
             border:1px solid #556; border-radius:8px; padding:10px 12px; color:#ddd; font-size:13px;
             box-shadow:0 6px 24px rgba(0,0,0,.6); max-width:520px; }
  #picker { position:fixed; display:none; background:#23262c; border:1px solid #556; border-radius:8px;
            z-index:70; color:#ddd; min-width:200px; box-shadow:0 6px 24px rgba(0,0,0,.6); font-size:13px; }
  #picker div.item { padding:7px 12px; cursor:pointer; }
  #picker div.item:hover { background:#3a3f48; }
  #picker div.item.dis { color:#777; cursor:default; }
  #picker .hdr { padding:6px 12px; color:#8a8f98; border-bottom:1px solid #444; font-size:11px; }
  #facewheel { position:absolute; z-index:45; display:none; }
  #facewheel button { position:absolute; border-radius:50%;
                      border:3px solid #7ce07c; background:rgba(20,40,20,.92); color:#9ee493;
                      cursor:pointer; }
  #facewheel button.pivotcost { border-color:#e0c05e; color:#e8d493; background:rgba(45,40,15,.9); }
  #facewheel button:hover { background:#2e5c2e; }
  .rchip { position:absolute; z-index:33; pointer-events:none; transform:translate(-50%,0);
           background:rgba(10,25,10,.88); color:#9ee493; font-size:22px; padding:3px 10px;
           border-radius:12px; border:1px solid #4e7a4e; white-space:nowrap; }
  .rchip.locked { color:#d8b46a; border-color:#7a6a3e; background:rgba(35,28,8,.88); }
  .rchip.hypo { border-style:dashed; color:#8fd6e8; border-color:#3e6a7a; background:rgba(8,25,35,.88); }
  .rchip small { color:#8a8f98; font-size:15px; }
  .floater { position:absolute; z-index:48; pointer-events:none; transform:translate(-50%,-50%);
             font-weight:bold; font-size:40px; text-shadow:0 0 8px #000,0 0 4px #000;
             animation:floatup 1.6s ease-out forwards; white-space:nowrap; }
  @keyframes floatup { 0%{opacity:0; margin-top:0;} 12%{opacity:1;}
                       75%{opacity:1;} 100%{opacity:0; margin-top:-90px;} }
</style>
</head>
<body>
<div id="topbar">
  <div class="tbrow"><!-- row 1: permanent controls — NOTHING here ever moves -->
    <b class="fixw" id="gamename" style="max-width:290px">…</b>
    <span class="chip fixw" id="turnchip" style="width:90px; text-align:center">…</span>
    <span class="chip brit fixw" id="vpbrit" style="width:100px; text-align:center">…</span>
    <span class="chip axis fixw" id="vpaxis" style="width:90px; text-align:center">…</span>
    <button class="sidebtn holdspace fixw" id="tierbtn" style="margin-left:auto; width:120px"></button>
    <button class="sidebtn" id="rulesbtn">📜 Rules</button>
    <button class="sidebtn" id="tablesbtn">📊 Tables</button>
    <button class="sidebtn" id="guidebtn">📖 Guide</button>
    <button class="sidebtn" id="menubtn" onclick="location.href='/menu'">☰ Games</button>
    <button class="sidebtn holdspace fixw" id="undobtn" style="width:110px">↶ Undo</button>
    <button class="sidebtn warn" id="newgame">New game</button>
  </div>
  <div class="tbrow"><!-- row 2: turn-state controls in FIXED slots -->
    <span class="chip hot fixw" id="segchip" style="width:300px">…</span>
    <span style="white-space:nowrap">you play:</span><span id="sidebtns" style="white-space:nowrap"></span>
    <label style="font-size:12px; white-space:nowrap">AI <select id="aimode" style="background:#2c2f36;color:#ccc;border:1px solid #555;border-radius:4px">
      <option value="step" selected>stepped (SPACE)</option>
      <option value="auto">auto</option>
      <option value="off">off</option>
    </select></label>
    <label style="font-size:12px; white-space:nowrap">pace <select id="aipace" style="background:#2c2f36;color:#ccc;border:1px solid #555;border-radius:4px">
      <option value="1200">slow</option>
      <option value="600" selected>medium</option>
      <option value="250">fast</option>
    </select></label>
    <button class="sidebtn" id="endmove">End movement</button>
    <button class="sidebtn" id="passfire">Pass fire</button>
    <button class="sidebtn" id="aibtn">AI acts</button>
    <span id="unitnav" class="holdspace" style="margin-left:auto; white-space:nowrap">
      <button class="sidebtn" id="prevunit" title="previous unit to act (B)">◀ unit</button>
      <button class="sidebtn" id="nextunit" title="next unit to act (N)">unit ▶</button>
    </span>
  </div>
</div>
<div id="tablespanel"></div>
<div id="zoomctl">
  <button id="zin" title="zoom in">+</button>
  <button id="zout" title="zoom out">−</button>
  <button id="zfit" title="fit the battle area">⛶</button>
</div>
<div id="viewport"><div id="world">
  <img class="map"><svg id="overlay"></svg><div id="facewheel"></div>
</div></div>
<div id="sidepanel">
  <div id="scen">…</div>
  <div id="lastres"><i>No fire resolved yet.</i></div>
  <div id="loghdr"><span>GAME LOG — every proposal, legal or not</span><span id="lognote"></span></div>
  <div id="log"></div>
</div>
<div id="actions"></div>
<div id="picker"></div>

<script src="frame.js?v=20260718b"></script>
<script>
const W = document.getElementById('world'), VP = document.getElementById('viewport');
const OV = document.getElementById('overlay'), FW = document.getElementById('facewheel');
const FACE_NAMES = ['NE','E','SE','SW','W','NW'];
const FACE_ARROWS = ['↗','→','↘','↙','←','↖'];
let GAME=null, FLOW=null, MAPW=0, MAPH=0, CPX=120, HX=64, HXC=32, HYH=59.5;
let scale=0.25, panX=0, panY=0;
let units=[], mySide='British', selected=null, legal=null, targets=null, dragging=null;
let aiBusy=false, rangeInfo=null, rangeCache={}, dragHex=null;
let aiStep=null;   // {plan:{desc,action}, stage:0 select | 1 intent}  (stage 2 = execute)
let autoRunning=false;   // auto mode drives advanceAIStep on a timer (per-action, animated)
function hexToPixel(col,row){ const g=GAME.grid;
  const xoff=(row%2===g.offset_parity)?g.dx/2:0;
  return {x:Math.round(g.x0+col*g.dx+xoff), y:Math.round(g.y0+row*g.dy)}; }
// P(2d6 >= n) in %
const P2D6={2:100,3:97,4:92,5:83,6:72,7:58,8:42,9:28,10:17,11:8,12:3};

// pan/zoom/layout/nav are ENGINE-LEVEL (ui/frame.js) — this screen only supplies hooks
function apply(){ FRAME.apply(); }
function centerOn(x,y){ FRAME.centerOn(x,y); }
FRAME.initFrame({
  viewport: VP, world: W, topbar: document.getElementById('topbar'),
  zoomMin: 0.08, zoomMax: 1.8,
  get: () => ({ panX, panY, scale, mapW: MAPW, mapH: MAPH }),
  set: o => { if(o.panX!==undefined)panX=o.panX;
              if(o.panY!==undefined)panY=o.panY;
              if(o.scale!==undefined)scale=o.scale; },
  fit: () => fitBounds(),
  select: u => FLOW.segment==='movement' ? selectMove(u) : selectFire(u),
  actable: () => actableUnits(),
  endBtnId: 'endmove',
  turnDone: () => {
    if(!FLOW||!myPhase()||FLOW.segment!=='movement')return false;
    const mine=units.filter(u=>u.side===mySide);
    return mine.length>0&&mine.every(u=>u.moved);
  },
  followTop: [{id:'sidepanel',gap:0},{id:'tablespanel',gap:8},
              {id:'rulespanel',gap:8},{id:'tierpanel',gap:8}],
  guideRight: 340,   // the guidance banner centers over the map, not the log

});
function fitBounds(){
  // zoom to the playable section, not the whole 7000px map
  if (!FLOW || !GAME) return;
  const b=FLOW.bounds, g=GAME.grid;
  const x0=(b.cols[0]-1.2)*g.dx, x1=(b.cols[1]+1.2)*g.dx;
  const y0=(b.rows[0]-1.2)*g.dy, y1=(b.rows[1]+1.2)*g.dy;
  scale=Math.min(VP.clientWidth/(x1-x0), VP.clientHeight/(y1-y0));
  panX=-x0*scale+(VP.clientWidth-(x1-x0)*scale)/2;
  panY=-y0*scale+(VP.clientHeight-(y1-y0)*scale)/2;
  apply();
}
let panDrag=null;
VP.addEventListener('pointerdown',e=>{ if(e.target.closest('.counter,#facewheel,.tring'))return;
  panDrag={x:e.clientX-panX,y:e.clientY-panY}; VP.setPointerCapture(e.pointerId); });
VP.addEventListener('pointermove',e=>{ if(dragging)return dragMove(e);
  if(panDrag){panX=e.clientX-panDrag.x;panY=e.clientY-panDrag.y;apply();} });
VP.addEventListener('pointerup',e=>{ if(dragging)dragEnd(e); panDrag=null; });
// wheel + zoom buttons are wired by FRAME.initFrame above
const toMap=e=>{const r=W.getBoundingClientRect();return{x:(e.clientX-r.left)/scale,y:(e.clientY-r.top)/scale};};

function bootGame(g){
  GAME=g; MAPW=g.map_w; MAPH=g.map_h; CPX=g.counter_px;
  document.getElementById('gamename').textContent=g.name.toUpperCase();
  document.title=g.name+" — VALOR Engine";
  HX=g.grid.dy/1.5; HXC=HX/2; HYH=g.grid.dx/2;
  document.querySelector('img.map').src=g.map_url;
  const SB=document.getElementById('sidebtns'); SB.innerHTML='';
  g.sides.forEach(s=>{
    const b=document.createElement('button'); b.className='sidebtn'; b.id='side-'+s.id; b.textContent=s.label;
    b.onclick=()=>{ mySide=s.id; deselect();
      SB.querySelectorAll('.sidebtn').forEach(x=>x.classList.remove('on'));
      b.classList.add('on'); render(); };
    SB.appendChild(b);
  });
  document.getElementById('side-'+mySide).classList.add('on');
}

async function refresh(){
  const s=await(await fetch('/api/state')).json();
  const first=!GAME;
  if(first)bootGame(s.game);
  units=s.units; FLOW=s.flow;
  OV.setAttribute('width',MAPW); OV.setAttribute('height',MAPH);
  if(first)fitBounds();
  document.getElementById('scen').textContent=FLOW.scenario+`  ·  seed ${FLOW.seed}`;
  if (FRAME.renderUndo) FRAME.renderUndo(s.undo);   // guard: stale-cached frame.js
  FRAME.renderTierBtn(); FRAME.renderRules();   // shared chrome (engine-level)
  render(); renderLog(); maybeAutoAI();
}

function aiSide(){ return GAME.sides.find(s=>s.id!==mySide).id; }
function sideLabel(id){ const s=GAME.sides.find(s=>s.id===id); return s?s.label:id; }

function myPhase(){
  if(FLOW.over)return false;
  if(FLOW.segment==='movement')return FLOW.mover===mySide;
  return FLOW.initiative===mySide && !FLOW.fire_done.includes(mySide);
}

function render(){
  document.querySelectorAll('.counter,.dmg,.tring').forEach(n=>n.remove());
  const T=document.getElementById('turnchip'), SG=document.getElementById('segchip');
  T.textContent=`Turn ${Math.min(FLOW.turn,FLOW.turns)} / ${FLOW.turns}`;
  const segTxt = FLOW.segment==='movement'
    ? `MOVEMENT — ${sideLabel(FLOW.mover)} moving`
    : `COMBAT [I.B.2] — ${sideLabel(FLOW.initiative)} fires next`;
  SG.textContent=segTxt; SG.className='chip hot fixw';
  SG.title=FLOW.segment==='combat'?'alternating fire [I.B.2]':'';
  document.getElementById('vpbrit').textContent=`British ${FLOW.vp.scores.British} VP`;
  document.getElementById('vpaxis').textContent=`Axis ${FLOW.vp.scores.Axis} VP`;
  if(FLOW.over){
    FRAME.setGuide(FLOW.winner==='draw'?`GAME OVER — DRAW ${JSON.stringify(FLOW.vp.scores)}`:
      `GAME OVER — ${sideLabel(FLOW.winner)} WINS  (British ${FLOW.vp.scores.British} : Axis ${FLOW.vp.scores.Axis})`, true);
  } else {
    const stepMode=document.getElementById('aimode').value==='step';
    FRAME.setGuide(myPhase() ? (FLOW.segment==='movement'
        ? `<b>YOUR MOVE — ${sideLabel(mySide)}</b>: ${FRAME.MOVE_HINT}, then pick its `
          +`facing. (<b>unit ▶</b> / N finds the next unmoved unit.) `
          +`Done? <b>End movement</b>.`
        : `<b>YOUR SHOT</b> — click one of your units, then click the hit-chance ring on an `
          +`enemy to fire (one unit per volley; the enemy answers). No shot worth taking? `
          +`<b>Pass fire</b>.`)
      : stepMode ? `${sideLabel(FLOW.segment==='movement'?FLOW.mover:FLOW.initiative)} (AI) — press <b>SPACE</b> to step its actions`
                 : `${sideLabel(FLOW.segment==='movement'?FLOW.mover:FLOW.initiative)} (AI) is acting…`);
  }
  document.getElementById('endmove').disabled=!(myPhase()&&FLOW.segment==='movement');
  FRAME.onRender();   // engine frame: unit-nav visibility
  document.getElementById('passfire').disabled=!(myPhase()&&FLOW.segment==='combat');
  document.getElementById('aibtn').disabled=FLOW.over||myPhase();
  // sole-way-forward (engine rule): red border on THE button that advances the game
  const alive=units.filter(u=>u.side===mySide&&!u.K);
  const allMoved=alive.length>0&&alive.every(u=>u.moved);
  FRAME.soleNext(FLOW.over ? 'newgame'
    : (myPhase()&&FLOW.segment==='movement'&&allMoved) ? 'endmove'
    : (!myPhase()&&document.getElementById('aimode').value==='step') ? 'aibtn'
    : null);

  const byhex={};
  units.forEach(u=>(byhex[u.hexnum]=byhex[u.hexnum]||[]).push(u));
  for(const h in byhex)byhex[h].forEach((u,i)=>{
    const el=document.createElement('img');
    const acted=(u.moved||u.pivoted||u.fired);
    el.className='counter'+(u.K?' dead':acted?' acted':'')+(selected&&selected.id===u.id?' sel':'');
    el.src=GAME.counters_url+encodeURIComponent(u.img||(u.name+'.png'));
    el.style.width=CPX+'px'; el.style.height=CPX+'px';
    el.style.margin=`-${CPX/2}px 0 0 -${CPX/2}px`;
    el.style.left=(u.x+i*16)+'px'; el.style.top=(u.y-i*16)+'px';
    el.style.zIndex=10+i; el.dataset.id=u.id;
    if(u.facing!==null&&u.facing!==undefined&&GAME.facing)
      el.style.transform=`rotate(${(GAME.facing.offset_deg||0)+u.facing*GAME.facing.step_deg}deg)`;
    el.title=`${u.name} — hex ${u.hexnum}, facing ${FACE_NAMES[u.facing||0]}`+
      (u.K?' — DESTROYED':(u.M?' — IMMOBILIZED':'')+(u.F?' — GUN OUT':''))+
      (u.moved?' — moved (may not fire)':'')+(u.fired?' — has fired':'');
    el.addEventListener('pointerdown',ev=>onCounterDown(ev,u));
    el.addEventListener('contextmenu',ev=>onCounterMenu(ev,u));
    W.appendChild(el);
    const badge=(txt,color,dx,dy)=>{ const d=document.createElement('div');
      d.className='dmg'; d.style.color=color; d.textContent=txt;
      d.style.left=(u.x+dx)+'px'; d.style.top=(u.y+dy)+'px'; W.appendChild(d); };
    if(u.K)badge('☠',' #ff6a5e',-14,-24);
    else{ if(u.M)badge('M','#ffd75e',-40,-24); if(u.F)badge('F','#ff9a5e',10,-24); }
  });
  drawOverlay(); drawTargets(); drawRangeChips();
}

// ---------- fire-picture overlay (movement phase) ----------
function drawRangeRings(){
  if(!rangeInfo||!selected||FLOW.segment!=='movement')return;
  const g=GAME.grid, cx=selected.x, cy=selected.y;
  const ring=(r,color,dash,label)=>{
    const c=document.createElementNS('http://www.w3.org/2000/svg','circle');
    c.setAttribute('cx',cx); c.setAttribute('cy',cy); c.setAttribute('r',r*g.dx);
    c.setAttribute('fill','none'); c.setAttribute('stroke',color);
    c.setAttribute('stroke-width','5'); if(dash)c.setAttribute('stroke-dasharray',dash);
    OV.appendChild(c);
    const t=document.createElementNS('http://www.w3.org/2000/svg','text');
    t.setAttribute('x',cx); t.setAttribute('y',cy-r*g.dx-12); t.setAttribute('text-anchor','middle');
    t.setAttribute('font-size','26'); t.setAttribute('fill',color); t.setAttribute('font-weight','bold');
    t.textContent=label; OV.appendChild(t);
  };
  if(rangeInfo.initiation_range)
    ring(rangeInfo.initiation_range,'#7ce07c','',`open fire ≤ ${rangeInfo.initiation_range} hexes (HPN ≤ 8)`);
  if(rangeInfo.max_range>rangeInfo.initiation_range)
    ring(rangeInfo.max_range,'#e0c05e','22 14',`max range ${rangeInfo.max_range} (needs flank/rear or return fire)`);
}
function drawRangeChips(){
  document.querySelectorAll('.rchip').forEach(n=>n.remove());
  if(!rangeInfo||!selected||FLOW.segment!=='movement')return;
  rangeInfo.targets.forEach(t=>{
    if(t.hpn===null||t.hpn===undefined)return;
    const tu=units.find(u=>u.id===t.target); if(!tu)return;

async function fetchRange(hex){

  const q=hex?`&col=${hex.col}&row=${hex.row}`:'';

function aiNarrate(txt){

const STAGE_HINTS=['selected','intent'];
async function advanceAIStep(){
  if(aiBusy||FLOW.over||myPhase())return;
  if(!aiStep){
    aiBusy=true;
    const p=await(await fetch('/api/ai_plan?side='+aiSide())).json();
    aiBusy=false;
    if(p.none){ await refresh(); return; }
    const single=['end_movement','pass_fire'].includes(p.action.type);
    aiStep={plan:p, stage: single?1:0};
    if(single){ aiNarrate(p.desc); drawOverlay(); return; }
    const u=units.find(x=>x.id===p.action.unit);
    if(u) centerOn(u.x,u.y);           // follow the camera to the acting unit
    aiNarrate(`<b>${u?u.name:'unit'}</b> @ ${u?u.hexnum:'?'} selected — ${
      {move:'will move',reverse:'will reverse',pivot:'will pivot',fire:'will fire'}[p.action.type]}…`);
    drawOverlay(); return;
  }
  if(aiStep.stage===0){
    aiStep.stage=1;
    aiNarrate(aiStep.plan.desc);
    drawOverlay(); return;
  }
  // execute through the gate
  aiBusy=true;
  const act=aiStep.plan.action;
  const r=await(await fetch('/api/action',{method:'POST',
    body:JSON.stringify({side:aiSide(),action:act})})).json();
  aiBusy=false;
  if(r.result&&r.result.weapon){ showFire(r.result,aiSide(),act); soundsForFire(r.result); }
  else if(r.verdict.legal&&['move','reverse'].includes(act.type)) sndMove();
  const done=aiStep.plan.desc;
  aiStep=null;
  await refresh();
  const A=document.getElementById('actions');
  A.innerHTML=`<b style="color:#9ee493">AI did:</b> ${done}` +
    (r.verdict.legal?'':` — <b style="color:#e88">REJECTED by the gate:</b> ${r.verdict.reasons.join('; ')}`) +
    ` &nbsp; <span style="color:#8a8f98">— SPACE for next</span>`;
  A.style.display='block';
}

// ---------- sound (WebAudio synthesis — no files) ----------
let AC=null;
function ac(){ if(!AC)AC=new (window.AudioContext||window.webkitAudioContext)();
  if(AC.state==='suspended')AC.resume(); return AC; }
document.addEventListener('pointerdown',()=>{ try{ac();}catch(e){} },{once:true});
function noiseBuf(ctx,secs){
  const b=ctx.createBuffer(1,ctx.sampleRate*secs,ctx.sampleRate), d=b.getChannelData(0);
  for(let i=0;i<d.length;i++)d[i]=Math.random()*2-1; return b; }
function sndMove(){ // tank engine rumble + track squeak
  try{ const c=ac(), t=c.currentTime, dur=1.1;
    const src=c.createBufferSource(); src.buffer=noiseBuf(c,dur);
    const lp=c.createBiquadFilter(); lp.type='lowpass'; lp.frequency.value=140; lp.Q.value=2;
    const g=c.createGain();
    g.gain.setValueAtTime(0.0001,t); g.gain.exponentialRampToValueAtTime(0.5,t+0.12);
    g.gain.setValueAtTime(0.5,t+dur-0.35); g.gain.exponentialRampToValueAtTime(0.0001,t+dur);
    const lfo=c.createOscillator(), lg=c.createGain(); lfo.frequency.value=11; lg.gain.value=60;
    lfo.connect(lg); lg.connect(lp.frequency); lfo.start(t); lfo.stop(t+dur);
    src.connect(lp); lp.connect(g); g.connect(c.destination); src.start(t);
    const o=c.createOscillator(), og=c.createGain(); o.type='sawtooth';
    o.frequency.setValueAtTime(48,t); o.frequency.linearRampToValueAtTime(62,t+dur);
    og.gain.setValueAtTime(0.10,t); og.gain.exponentialRampToValueAtTime(0.0001,t+dur);
    o.connect(og); og.connect(c.destination); o.start(t); o.stop(t+dur);
  }catch(e){} }
function sndFire(){ // cannon: sharp noise crack + deep thump
  try{ const c=ac(), t=c.currentTime;
    const src=c.createBufferSource(); src.buffer=noiseBuf(c,0.5);
    const bp=c.createBiquadFilter(); bp.type='lowpass';
    bp.frequency.setValueAtTime(3000,t); bp.frequency.exponentialRampToValueAtTime(120,t+0.4);
    const g=c.createGain();
    g.gain.setValueAtTime(0.9,t); g.gain.exponentialRampToValueAtTime(0.0001,t+0.5);
    src.connect(bp); bp.connect(g); g.connect(c.destination); src.start(t);
    const o=c.createOscillator(), og=c.createGain(); o.type='sine';
    o.frequency.setValueAtTime(110,t); o.frequency.exponentialRampToValueAtTime(38,t+0.35);
    og.gain.setValueAtTime(0.8,t); og.gain.exponentialRampToValueAtTime(0.0001,t+0.45);
    o.connect(og); og.connect(c.destination); o.start(t); o.stop(t+0.5);
  }catch(e){} }
function sndRicochet(){ // high metallic ping, quick pitch drop
  try{ const c=ac(), t=c.currentTime;
    const o=c.createOscillator(), g=c.createGain(); o.type='triangle';
    o.frequency.setValueAtTime(2600,t); o.frequency.exponentialRampToValueAtTime(700,t+0.28);
    g.gain.setValueAtTime(0.25,t); g.gain.exponentialRampToValueAtTime(0.0001,t+0.3);
    o.connect(g); g.connect(c.destination); o.start(t); o.stop(t+0.32);
  }catch(e){} }
function sndKill(){ // slow deep explosion
  try{ const c=ac(), t=c.currentTime, dur=1.4;
    const src=c.createBufferSource(); src.buffer=noiseBuf(c,dur);
    const lp=c.createBiquadFilter(); lp.type='lowpass';
    lp.frequency.setValueAtTime(900,t); lp.frequency.exponentialRampToValueAtTime(60,t+dur);
    const g=c.createGain();
    g.gain.setValueAtTime(1.0,t); g.gain.exponentialRampToValueAtTime(0.0001,t+dur);
    src.connect(lp); lp.connect(g); g.connect(c.destination); src.start(t);
  }catch(e){} }
function sndImpact(){ // penetrating hit: short mid boom (bigger than ping, smaller than kill)
  try{ const c=ac(), t=c.currentTime, dur=0.5;
    const src=c.createBufferSource(); src.buffer=noiseBuf(c,dur);
    const lp=c.createBiquadFilter(); lp.type='lowpass';
    lp.frequency.setValueAtTime(500,t); lp.frequency.exponentialRampToValueAtTime(80,t+dur);
    const g=c.createGain();
    g.gain.setValueAtTime(0.55,t); g.gain.exponentialRampToValueAtTime(0.0001,t+dur);
    src.connect(lp); lp.connect(g); g.connect(c.destination); src.start(t);
  }catch(e){} }
function sndMiss(){ // loud shell whoosh past, then dirt-impact thump
  try{ const c=ac(), t=c.currentTime;
    const src=c.createBufferSource(); src.buffer=noiseBuf(c,0.55);
    const bp=c.createBiquadFilter(); bp.type='bandpass'; bp.Q.value=1.2;
    bp.frequency.setValueAtTime(2600,t); bp.frequency.exponentialRampToValueAtTime(350,t+0.45);
    const g=c.createGain();
    g.gain.setValueAtTime(0.0001,t); g.gain.exponentialRampToValueAtTime(0.65,t+0.12);
    g.gain.exponentialRampToValueAtTime(0.0001,t+0.55);
    src.connect(bp); bp.connect(g); g.connect(c.destination); src.start(t);
    // dirt thump where the round lands
    const th=c.createBufferSource(); th.buffer=noiseBuf(c,0.3);
    const lp=c.createBiquadFilter(); lp.type='lowpass';
    lp.frequency.setValueAtTime(300,t+0.4); lp.frequency.exponentialRampToValueAtTime(60,t+0.7);
    const tg=c.createGain();
    tg.gain.setValueAtTime(0.0001,t); tg.gain.setValueAtTime(0.5,t+0.42);
    tg.gain.exponentialRampToValueAtTime(0.0001,t+0.72);
    th.connect(lp); lp.connect(tg); tg.connect(c.destination); th.start(t+0.4);
  }catch(e){} }
function floatAt(pid,txt,color,delay){
  const tu=units.find(u=>u.id===pid); if(!tu)return;
  setTimeout(()=>{
    const d=document.createElement('div'); d.className='floater';
    d.style.color=color; d.textContent=txt;
    d.style.left=tu.x+'px'; d.style.top=(tu.y-CPX*0.4)+'px';
    W.appendChild(d); setTimeout(()=>d.remove(),1700);
  },delay);
}
function soundsForFire(res){
  sndFire();
  // after the muzzle blast, each round lands in sequence — audibly AND on the map
  let dt=420;
  if(!(res.hits||0)){
    setTimeout(sndMiss,dt);
    floatAt(res.target,`MISS${res.rounds>1?' ×'+res.rounds:''}`,'#c8ccd4',dt);
    return;
  }
  const misses=(res.shots||[]).filter(s=>!s.hit&&!s.auto).length;
  if(misses){ setTimeout(sndMiss,dt); floatAt(res.target,`miss ×${misses}`,'#9aa0a8',dt); dt+=340; }
  (res.damage||[]).forEach(d=>{
    const killed=(d.result||[]).some(x=>x.startsWith('K'))||(d.pk_roll&&d.pk_roll.k_kill);
    let f,txt,col;
    if(killed){ f=sndKill; txt='K-KILL'; col='#ff6a5e'; }
    else if(d.part==='-'){ f=sndRicochet; txt='RICOCHET'; col='#ffd75e'; }
    else if(!(d.result||[]).length){ f=sndRicochet; txt='NO EFFECT'; col='#d8b46a'; }
    else { f=sndImpact; txt=d.result.join('+')+' hit '+d.part; col='#ff9a5e'; }
    setTimeout(f,dt); floatAt(res.target,txt,col,dt); dt+=340;
  });
}

// ---------- actions ----------
async function postAction(action){
  const r=await(await fetch('/api/action',{method:'POST',
    body:JSON.stringify({side:mySide,action})})).json();
  if(!r.verdict.legal) toastReasons(r.verdict.reasons);
  else if(action.type==='move'||action.type==='reverse') sndMove();
  if(r.result&&r.result.weapon){ showFire(r.result,mySide,action); soundsForFire(r.result); }
  deselect(); await refresh();
  return r;
}
function toastReasons(reasons){
  const A=document.getElementById('actions');
  A.innerHTML=`<b style="color:#e88">ILLEGAL — the gate refused:</b><br>${reasons.join('<br>')}
    <br><button class="sidebtn" onclick="document.getElementById('actions').style.display='none'">ok</button>`;
  A.style.display='block';
}

// which units can still act this segment — the game-specific half of unit nav
// (the stepping itself is engine-level, ui/frame.js)
function actableUnits(){
  if(!FLOW||FLOW.over||!myPhase())return [];
  const mine=units.filter(u=>u.side===mySide&&!u.K);
  return FLOW.segment==='movement'
    ? mine.filter(u=>!u.moved)
    : mine.filter(u=>!u.fired&&!u.moved&&!u.F);   // moved units may not fire [I.E.4]
}

function onCounterDown(ev,u){
  ev.stopPropagation();
  if(FLOW.over)return;
  if(selected&&selected.id===u.id&&legal){ dragStart(ev,u); return; }
  if(u.side!==mySide||!myPhase())return;
  if(FLOW.segment==='movement')selectMove(u);
  else selectFire(u);
}

async function selectMove(u){
  targets=null; rangeCache={}; dragHex=null;

    <br>Fire picture from HERE (${rangeInfo.weapon_label}): ${inreach} enemy in gun range — chips show
    <b>to-hit + % per round × rounds → % ≥1 hit</b>; 🔒 = may not open fire (HPN>8) unless flank/rear/return fire.
    Dragging shows the (dashed) NEXT-turn picture from that hex — <b>moving forfeits this turn's fire [I.E.4]</b>.
    <br><i>Turret: 360° field of fire — facing never blocks YOUR shot [I.E.2]; it sets which armor
    (front/flank/rear) the ENEMY hits, and flank/rear exposure lets them open fire beyond the normal limit [I.H.2].</i>
    <br><i>${rangeInfo.secondary}</i>

async function selectFire(u){
  legal=null;
  if(u.moved){ toastReasons(['no weapon or vehicle which has been MOVED may fire in the combat segment of the same turn [I.E.4]']); return; }
  if(u.fired){ toastReasons(['each unit may fire its available rounds only once per combat segment [I.E.5]']); return; }
  if(u.F){ toastReasons(["unit's firepower is lost (F-kill)"]); return; }
  if(u.K)return;
  const lt=await(await fetch('/api/legal_targets?id='+u.id)).json();
  selected=u; targets=lt.targets; render();
  const n=targets.filter(t=>t.legal).length;

    <button class="sidebtn" onclick="deselect()">Cancel</button>`;

}

async function fireAt(t){
  await postAction({type:'fire',unit:selected.id,target:t.target});
}

function showFire(res,side,action){
  const L=document.getElementById('lastres');
  const shots=res.shots.map(s=>s.auto?`<span class="hit">auto-hit</span>`:
    `<span class="die">${s.dice[0]}</span><span class="die">${s.dice[1]}</span>=${s.total} `+
    `<span class="${s.hit?'hit':'miss'}">${s.hit?'HIT':'miss'}</span>`).join('<br>');
  const dmg=res.damage.map(d=>{
    let s=`&nbsp;&nbsp;area <span class="die">${d.area_dice[0]}</span><span class="die">${d.area_dice[1]}</span> → <b>${d.part}</b>`;
    if(d.note)s+=` — ${d.note}`;
    if(d.result&&d.result.length)s+=` — <span class="hit">${d.result.join('+')}</span>`;
    if(d.pk_roll)s+=` (P-roll <span class="die">${d.pk_roll.die}</span> vs ≤${d.pk_roll.needed}: ${d.pk_roll.k_kill?'<b class="hit">K-KILL</b>':'no kill'})`;
    return s; }).join('<br>');
  const kill=res.k_kill?' — <b style="color:#ff6a5e">DESTROYED</b>':
    (res.m_kill?' — IMMOBILIZED':'')+(res.f_kill?' — GUN OUT':'');
  L.innerHTML=`<b>${sideLabel(side)}</b> ${res.weapon} @ range ${res.range}`+
    (res.same_hex?' (same hex)':` — HPN ${res.hpn}${res.hpn_adjusted!==res.hpn?('→'+res.hpn_adjusted+' (target moved)'):''}`)+
    `, ${res.rounds} round(s)${res.acquired?' (acquired)':''}<br>${shots}`+
    (res.hits?`<br><b>${res.hits} hit(s)</b> on ${res.aspect.toUpperCase()} aspect:<br>${dmg}`:'')+kill;
}

// ---------- drag + facing wheel ----------
function dragStart(ev,u){ const el=document.querySelector(`.counter[data-id="${u.id}"]`);
  dragging={u,el}; el.classList.add('dragging'); ev.stopPropagation(); }
function allSpots(){ return (legal.dests||[]).concat((legal.reverse||[]).map(r=>({...r,isRev:true}))); }
function nearestLegal(m){ let best=null,bd=90*90;
  allSpots().forEach(h=>{const d=(h.x-m.x)**2+(h.y-m.y)**2; if(d<bd){bd=d;best=h;}});
  return best; }
function dragMove(e){ const m=toMap(e);
  dragging.el.style.left=m.x+'px'; dragging.el.style.top=m.y+'px';
  const best=nearestLegal(m);
  const key=best?`${best.col},${best.row}`:null;
  if(key!==dragHex){ dragHex=key;
    if(best){ fetchRange(best).then(r=>{ if(dragHex===key){ rangeInfo=r; drawRangeChips(); } }); }
    else { fetchRange(null).then(r=>{ if(dragHex===null){ rangeInfo=r; drawRangeChips(); } }); }
  } }
function dragEnd(e){
  const m=toMap(e), u=dragging.u;
  dragging.el.classList.remove('dragging'); dragging=null;
  const best=nearestLegal(m);
  if(!best){ render(); return; }
  showFaceWheel(u,best);
}
function showFaceWheel(u,dest){
  render();   // snap counter back visually until the move is real
  FW.innerHTML=''; FW.style.display='block';
  FW.style.left=dest.x+'px'; FW.style.top=dest.y+'px';
  // buttons sized in SCREEN pixels (divide by zoom) so they're always easy to hit
  const S=Math.round(72/scale), R=Math.max(CPX*0.95, S*1.05);
  const okFacings = dest.isRev? dest.facings :
    [...new Set([...(dest.free_facings||[]), ...(dest.any_facing?[0,1,2,3,4,5]:[])])];
  const mkBtn=(txt,x,y,title,cls,fn)=>{
    const b=document.createElement('button');
    b.style.width=S+'px'; b.style.height=S+'px';
    b.style.margin=`-${S/2}px 0 0 -${S/2}px`;
    b.style.fontSize=Math.round(S*0.48)+'px';
    b.style.left=x+'px'; b.style.top=y+'px';
    b.textContent=txt; b.title=title; if(cls)b.className=cls;
    b.onclick=fn; FW.appendChild(b);
  };
  okFacings.forEach(f=>{
    const ang=(30+f*60)*Math.PI/180;
    const free=dest.isRev||((dest.free_facings||[]).includes(f));
    mkBtn(FACE_ARROWS[f], Math.sin(ang)*R, -Math.cos(ang)*R,
      `face ${FACE_NAMES[f]}`+(free?'':' (+1 MP final pivot)'), free?'':'pivotcost',
      async()=>{ FW.style.display='none';
        await postAction({type:dest.isRev?'reverse':'move',unit:u.id,dest:[dest.col,dest.row],facing:f}); });
  });
  mkBtn('✕',0,0,'cancel','',()=>{ FW.style.display='none'; deselect(); });
}

function onCounterMenu(ev,u){
  ev.preventDefault(); ev.stopPropagation();
  if(u.side!==mySide||!myPhase()||FLOW.segment!=='movement')return;
  const P=document.getElementById('picker');
  P.innerHTML=`<div class="hdr">${u.name} — pivot in place (free, may still fire) [I.C.3.a]</div>`;
  for(let f=0;f<6;f++){
    const d=document.createElement('div'); d.className='item'+(f===u.facing?' dis':'');
    d.innerHTML=`${FACE_ARROWS[f]} face ${FACE_NAMES[f]}${f===u.facing?' (current)':''}`;
    if(f!==u.facing)d.onclick=async()=>{ P.style.display='none';
      await postAction({type:'pivot',unit:u.id,facing:f}); };
    P.appendChild(d);
  }
  const c=document.createElement('div'); c.className='item'; c.textContent='Cancel';
  c.onclick=()=>P.style.display='none'; P.appendChild(c);
  P.style.left=Math.min(ev.clientX+8,innerWidth-230)+'px'; P.style.top=ev.clientY+8+'px';
  P.style.display='block';
}
document.addEventListener('pointerdown',e=>{
  if(!e.target.closest('#picker'))document.getElementById('picker').style.display='none'; });

function deselect(){ selected=null; legal=null; targets=null; rangeInfo=null; rangeCache={}; dragHex=null;
  FW.style.display='none';
  document.getElementById('actions').style.display='none'; render(); }

// ---------- log panel ----------
async function renderLog(){
  const r=await(await fetch('/api/log?n=60')).json();
  const L=document.getElementById('log');
  L.innerHTML=r.entries.map(e=>{
    if(e.event==='init')return `<div class="le event">n${e.n} INIT ${e.scenario} seed=${e.seed}</div>`;
    const v=e.verdict||{}; const cls=v.legal?'legal':'illegal';
    let txt=`n${e.n} T${e.turn} ${e.segment} ${e.side}: ${e.action.type}`;
    if(e.action.dest)txt+=` →${e.action.dest.join(',')} f${e.action.facing}`;
    if(e.action.type==='fire')txt+=` ${String(e.action.unit).slice(-2)}→${String(e.action.target).slice(-2)}`;
    if(!v.legal)txt+=`\n   REJECTED: ${v.reasons.join('; ')}`;
    else if(e.result){
      if(e.result.hits!==undefined)txt+=` — ${e.result.hits} hit(s)`+
        (e.result.k_kill?' K-KILL':'')+(e.result.m_kill?' M':'')+(e.result.f_kill?' F':'');
      if(e.result.note)txt+=` — ${e.result.note}`;
    }
    return `<div class="le ${cls}">${txt}</div>`;
  }).join('');
  L.scrollTop=L.scrollHeight;
  document.getElementById('lognote').textContent=`${r.entries.length} shown`;
}

// ---------- AI ----------
async function runAI(){
  if(aiBusy||FLOW.over||myPhase())return;
  aiBusy=true;
  try{
    const r=await(await fetch('/api/ai_turn',{method:'POST',
      body:JSON.stringify({side:aiSide()})})).json();
    let moved=false;
    (r.steps||[]).forEach(st=>{
      if(st.result&&st.result.weapon){ showFire(st.result,aiSide(),st.action); soundsForFire(st.result); }
      if(st.verdict.legal&&['move','reverse'].includes(st.action.type))moved=true;
    });
    if(moved)sndMove();
  } finally { aiBusy=false; }
  await refresh();
}
function maybeAutoAI(){
  if(document.getElementById('aimode').value!=='auto'){ autoRunning=false; return; }
  if(FLOW.over||myPhase()){ aiStep=null; autoRunning=false; return; }
  if(autoRunning) return;          // already looping — don't stack timers
  autoRunning=true; autoTick();
}
async function autoTick(){
  // auto mode = the SAME single-action stepper the SPACE key uses, on a timer,
  // so every unit visibly moves one at a time (no jump-cut to the end state).
  if(document.getElementById('aimode').value!=='auto' || FLOW.over || myPhase()){
    autoRunning=false; aiStep=null; return;
  }
  const executing = !!aiStep && aiStep.stage>=1;   // this tick executes an action
  await advanceAIStep();
  if(!autoRunning) return;
  const pace=parseInt(document.getElementById('aipace').value)||800;
  // pause the full pace AFTER a move/fire lands; flick quickly through the
  // select/intent reveals so the motion reads as a movie, not a slideshow
  setTimeout(autoTick, executing ? pace : Math.min(200, pace));
}
document.addEventListener('DOMContentLoaded',()=>{
  const p=document.getElementById('aipace'), m=document.getElementById('aimode');
  const savedPace=localStorage.getItem('aipace');
  p.value=['1200','600','250'].includes(savedPace)?savedPace:'600';
  p.onchange=()=>localStorage.setItem('aipace',p.value);
  m.value=localStorage.getItem('aimode')||'step';
  m.onchange=()=>{ localStorage.setItem('aimode',m.value); aiStep=null; refresh(); };
});

// (the Guide panel is ENGINE-LEVEL now — ui/frame.js; Tobruk's guide
// content lives in games/tobruk/game.json "guide".)

// ---------- Tier / Rules / Tables panels: ENGINE-LEVEL (ui/frame.js) ----------
FRAME.initUndo({ refresh, toast: (m) => toastReasons([m]) });  // engine-level undo
FRAME.initPanels({
  game: () => GAME,
  flow: () => FLOW,
  toast: (m) => toastReasons([m]),
  clientItems: (gated) => [
    `<li><b>Firing</b> — after the movement segment, select your unit then click an
     enemy in range: the engine answers the three questions (to-hit, aspect, damage)
     on the transcribed data cards with its own seeded dice.</li>`,
    `<li><b>End movement / Pass fire</b> — close your segment; the turn strip shows
     whose decision the game is waiting on.</li>`,
    `<li><b>AI</b> — stepped (press SPACE per action) or auto; the AI proposes
     through the same legality gate you play through.</li>`,
  ],
});
FRAME.layoutBars();

// ---------- top bar ----------
document.getElementById('endmove').onclick=()=>postAction({type:'end_movement'});
document.getElementById('passfire').onclick=()=>postAction({type:'pass_fire'});
document.getElementById('aibtn').onclick=()=>advanceAIStep();   // one action, animated (not a batch jump)
document.getElementById('newgame').onclick=async()=>{
  if(!confirm('Start a fresh game? The current log is replaced.'))return;
  await fetch('/api/new_game',{method:'POST',body:JSON.stringify({})});
  deselect(); await refresh(); fitBounds();
};
setInterval(()=>{ if(!dragging&&!selected)refresh(); },2500);
refresh();
