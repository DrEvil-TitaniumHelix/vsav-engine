name: tests

on:
  push:
    branches: [master]
  pull_request:
  workflow_dispatch:

jobs:
  validators:
    name: Run engine validators
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      # The engine is stdlib-only; no pip install is needed to run the suite.
      - name: Show Python
        run: python --version

      # The 4 ingest cross-check validators need the private ../VassalIngest
      # decode material, which is not in this public repo. run_all.py skips
      # them cleanly; the 14 self-contained validators must all pass.
      # AI validators run in --smoke mode here (1 seed, short game): still
      # exercises the gate, combat, byte-exact replay and no-stall properties,
      # but finishes in minutes on CI's slower runners. The full 5-seed soak is
      # run locally / before a release (plain `python run_all.py`).
      - name: Run the test suite (AI in smoke mode)
        run: python run_all.py --ai-smoke
