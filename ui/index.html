<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>VALOR Engine</title>
<style>
  html,body { margin:0; height:100%; overflow:hidden; background:#1a1c20; font-family:Segoe UI,sans-serif; }
  /* Two FIXED rows, no wrapping: every control has a permanent pixel position
     (Bruce's rule — you must always know where each button is). Turn-state
     controls hide via visibility (frame.js .holdspace) so their slot never
     collapses; variable text sits in fixed-width .fixw cells. */
  #topbar { position:fixed; top:0; left:0; right:0; background:#23262c; color:#ddd;
            padding:4px 14px; z-index:50; font-size:14px;
            box-shadow:0 2px 8px rgba(0,0,0,.5); min-width:920px; }
  .tbrow { display:flex; align-items:center; flex-wrap:nowrap; gap:0 12px; height:37px; }
  #zoomctl { position:fixed; right:14px; bottom:14px; z-index:48; display:flex; flex-direction:column; gap:6px; }
  #zoomctl button { width:40px; height:40px; border-radius:8px; border:1px solid #555;
                    background:#23262cee; color:#ddd; font-size:20px; cursor:pointer;
                    box-shadow:0 3px 10px rgba(0,0,0,.5); }
  #zoomctl button:hover { background:#3a6ea5; color:#fff; }
  #topbar b { color:#fff; }
  .sidebtn { padding:4px 12px; border-radius:5px; border:1px solid #555; background:#2c2f36;
             color:#ccc; cursor:pointer; }
  .sidebtn.on { background:#3a6ea5; color:#fff; border-color:#6aa0d8; }
  #progress { color:#9fc27f; width:230px; text-align:right; }
  #note { color:#8a8f98; font-size:12px; flex:1; min-width:0; }
  #viewport { position:absolute; top:82px; left:0; right:0; bottom:0; overflow:hidden; cursor:grab; }
  #world { position:absolute; transform-origin:0 0; }
  #world.glide { transition: transform .35s ease; }
  .pulse { animation:pulseglow 1.2s ease-in-out infinite; background:#2c6e3a!important;
           border-color:#7ce07c!important; color:#fff!important; }
  @keyframes pulseglow { 0%,100% { box-shadow:0 0 0 0 rgba(120,224,120,0); }
                         50% { box-shadow:0 0 14px 4px rgba(120,224,120,.6); } }
  #world img.map { display:block; user-select:none; -webkit-user-drag:none; }
  svg#overlay { position:absolute; top:0; left:0; pointer-events:none; }
  .counter { position:absolute; cursor:pointer;
             user-select:none; -webkit-user-drag:none; border-radius:4px; }
  .counter.done { filter:grayscale(.9) brightness(.65); }
  /* selection must be UNMISSABLE (Bruce 2026-07-17): fat ring + glow,
     and every selected counter is also listed in #selbox bottom-right */
  .counter.sel { outline:4px solid #ffd75e; outline-offset:2px; z-index:30!important;
                 box-shadow:0 0 0 7px rgba(255,215,94,.35), 0 0 22px 8px rgba(255,215,94,.8); }
  .counter.selatk { outline:4px solid #ff5040; outline-offset:2px; z-index:29!important;
                    box-shadow:0 0 0 7px rgba(255,80,64,.35), 0 0 22px 8px rgba(255,80,64,.8); }
  .counter.seldef { outline:4px solid #4e9de0; outline-offset:2px; z-index:29!important;
                    box-shadow:0 0 0 7px rgba(78,157,224,.35), 0 0 22px 8px rgba(78,157,224,.8); }
  /* units that may still act this activation/turn (matches unit ▶).
     Ring width is zoom-compensated (--ringpx set by FRAME.apply) so it
     stays clearly visible even zoomed all the way out. */
  .counter.actable { outline: calc(5px * var(--ringpx, 1)) solid #b8ff5e;
                     outline-offset: calc(2px * var(--ringpx, 1));
                     box-shadow: 0 0 calc(16px * var(--ringpx, 1))
                                 calc(6px * var(--ringpx, 1))
                                 rgba(160,255,90,.7); }
  .counter.flashfocus { animation: flashfocus 1.6s ease-out; }
  @keyframes flashfocus {
    0%,20%,40% { outline:6px solid #fff; box-shadow:0 0 30px 14px rgba(255,255,255,.95); }
    10%,30%    { outline:6px solid #ffd75e; box-shadow:0 0 10px 2px rgba(255,215,94,.4); }
    100%       { } }
  a.ulink { color:#8fc7ff; cursor:pointer; text-decoration:underline dotted; }
  a.ulink:hover { color:#c4e2ff; }
  #selbox { position:fixed; right:14px; bottom:150px; z-index:47; max-width:280px;
            background:#23262cee; border:1px solid #3a3f47; border-radius:8px;
            color:#dde3ea; font-size:12.5px; padding:8px 10px;
            box-shadow:0 6px 24px rgba(0,0,0,.5); }
  #selbox .hdr { color:#9aa3ad; font-size:11px; margin-bottom:4px; }
  #selbox .row { display:flex; gap:6px; align-items:center; margin:2px 0; }
  #selbox .row .x { cursor:pointer; color:#e0a34e; padding:0 4px; }
  #selbox .row .x:hover { color:#ff5040; }
  .counter.dragging { z-index:40!important; pointer-events:none; opacity:.85; }
  .badge { position:absolute; margin:-48px 0 0 14px; background:#c33; color:#fff; font-size:11px;
           border-radius:8px; padding:0 5px; z-index:31; pointer-events:none; }
  #picker { position:fixed; display:none; background:#23262c; border:1px solid #556; border-radius:8px;
            z-index:60; color:#ddd; min-width:210px; box-shadow:0 6px 24px rgba(0,0,0,.6); font-size:13px; }
  #picker div.item { padding:7px 12px; cursor:pointer; display:flex; gap:8px; align-items:center; }
  #picker div.item:hover { background:#3a3f48; }
  #picker img { width:26px; height:26px; }
  #picker .hdr { padding:6px 12px; color:#8a8f98; border-bottom:1px solid #444; font-size:11px; }
  #actions { position:fixed; display:none; z-index:60; background:#23262c; border:1px solid #556;
             border-radius:8px; padding:8px 10px; color:#ddd; font-size:13px; box-shadow:0 6px 24px rgba(0,0,0,.6); }
  #actions button { margin-left:8px; }
  #toast { position:fixed; left:50%; transform:translateX(-50%); bottom:60px; display:none;
           background:#5a2323; border:1px solid #c33; color:#ffd8d0; padding:10px 18px;
           border-radius:8px; z-index:70; font-size:14px; max-width:70%;
           box-shadow:0 6px 24px rgba(0,0,0,.6); }
  #tip { position:fixed; display:none; z-index:80; pointer-events:none;
         background:#23262cf5; border:1px solid #556; border-radius:8px; padding:8px 11px;
         color:#dde3ea; font-size:12.5px; max-width:300px; line-height:1.5;
         box-shadow:0 6px 24px rgba(0,0,0,.6); }
  #tip b { color:#fff; font-size:13px; }
  .dim { color:#9aa3ad; }
  #rulespanel { display:none; position:fixed; top:52px; right:8px; width:440px; max-width:44vw;
                max-height:82vh; overflow:auto; background:#23262cee; color:#dde3ea;
                font-size:13px; border:1px solid #3a3f47; border-radius:8px;
                padding:10px 14px; z-index:45; box-shadow:0 6px 24px rgba(0,0,0,.5); }
  #rulespanel ul { margin:4px 0 8px; padding-left:20px; }
  #rulespanel li { margin:3px 0; }
  #tablespanel { display:none; position:fixed; top:52px; right:8px; width:600px; max-width:60vw;
                 max-height:82vh; overflow:auto; background:#23262cf5; color:#dde3ea;
                 font-size:13px; border:1px solid #3a3f47; border-radius:8px;
                 padding:10px 14px; z-index:46; box-shadow:0 6px 24px rgba(0,0,0,.5); }
  #tablespanel h3 { margin:10px 0 3px; font-size:14px; color:#fff; }
  #tablespanel .cite { color:#8a8f98; font-size:11.5px; margin-bottom:6px; }
  #tablespanel table { border-collapse:collapse; margin:4px 0 6px; font-variant-numeric:tabular-nums; }
  #tablespanel th, #tablespanel td { border:1px solid #3a3f47; padding:3px 7px; text-align:center; }
  #tablespanel th { background:#2c2f36; color:#c8d2dc; font-weight:600; }
  #tablespanel td:first-child, #tablespanel th:first-child { text-align:left; white-space:nowrap; color:#cdd6df; }
  #tablespanel .legend { margin:2px 0 6px; padding-left:2px; }
  #tablespanel .legend div { margin:2px 0; }
  #tablespanel .legend code { color:#ffd75e; font-weight:600; margin-right:6px; }
  #tablespanel .notes { color:#9aa3ad; font-size:12px; margin:2px 0 4px; padding-left:16px; }
  #tablespanel .notes li { margin:2px 0; }
</style>
</head>
<body>
<div id="topbar">
  <div class="tbrow"><!-- row 1: permanent controls — NOTHING here ever moves -->
    <b id="gamename" class="fixw" style="max-width:240px">…</b>
    <span style="white-space:nowrap">play as:</span>
    <span id="sidebtns" style="white-space:nowrap"></span>
    <span id="note" class="fixw"></span>
    <span id="progress" class="fixw"></span>
    <button class="sidebtn holdspace fixw" id="tierbtn" style="width:120px"></button>
    <button class="sidebtn" id="pbmbtn">⚔ Matches</button>
    <button class="sidebtn" id="rulesbtn">📜 Rules</button>
    <button class="sidebtn" id="tablesbtn">📊 Tables</button>
    <button class="sidebtn" id="guidebtn">📖 Guide</button>
    <button class="sidebtn" id="menubtn" onclick="location.href='/menu'">☰ Games</button>
    <button class="sidebtn" id="resetbtn">Reset game</button>
  </div>
  <div class="tbrow"><!-- row 2: turn-state controls in FIXED slots (visibility-toggled) -->
    <span id="flowbar" class="fixw holdspace" style="width:300px; color:#ffd75e; font-weight:600"></span>
    <button class="sidebtn fixw holdspace" id="endphasebtn" style="width:140px">End player turn</button>
    <span id="aictl" class="holdspace" style="display:inline-flex; align-items:center; gap:6px; white-space:nowrap">
      <span style="color:#9fc27f; font-weight:600">AI</span>
      <select id="aimode" style="background:#2c2f36;color:#ccc;border:1px solid #555;border-radius:4px">
        <option value="step" selected>stepped (SPACE)</option>
        <option value="auto">auto play</option>
      </select>
      <span style="font-size:12px">pace</span>
      <select id="aipace" style="background:#2c2f36;color:#ccc;border:1px solid #555;border-radius:4px">
        <option value="1200">slow</option>
        <option value="600" selected>medium</option>
        <option value="250">fast</option>
      </select>
      <button class="sidebtn fixw" id="aiplaybtn" style="width:170px">▶ Play AI turn</button>
      <span id="aithinking" class="holdspace" style="color:#ffd75e; white-space:nowrap">⏳ thinking…</span>
    </span>
    <span id="unitnav" class="holdspace" style="margin-left:auto; white-space:nowrap">
      <button class="sidebtn" id="prevunit" title="previous unit to act (B)">◀ unit</button>
      <button class="sidebtn" id="nextunit" title="next unit to act (N)">unit ▶</button>
    </span>
  </div>
</div>
<div id="tierpanel" style="display:none; position:fixed; top:52px; right:8px; width:360px;
     background:#23262cee; color:#dde3ea; font-size:13px; border:1px solid #3a3f47;
     border-radius:8px; padding:10px 14px; z-index:46; box-shadow:0 6px 24px rgba(0,0,0,.5);"></div>
<div id="pbmpanel" style="display:none; position:fixed; top:52px; right:8px; width:400px;
     max-height:82vh; overflow:auto; background:#23262cee; color:#dde3ea; font-size:13px;
     border:1px solid #3a3f47; border-radius:8px; padding:10px 14px; z-index:46;
     box-shadow:0 6px 24px rgba(0,0,0,.5);"></div>
<div id="viewport">
  <div id="world">
    <img class="map">
    <svg id="overlay"></svg>
  </div>
</div>
<div id="picker"></div>
<div id="actions"></div>
<div id="tip"></div>
<div id="rulespanel"></div>
<div id="tablespanel"></div>
<div id="zoomctl">
  <button id="zin" title="zoom in">+</button>
  <button id="zout" title="zoom out">−</button>
  <button id="zfit" title="fit whole map">⛶</button>
</div>
<div id="arrivals" style="display:none; position:fixed; top:52px; left:8px; max-width:340px;
     max-height:60vh; overflow:auto; background:#23262cee; color:#dde3ea; font-size:13px;
     border:1px solid #3a3f47; border-radius:8px; padding:10px 12px; z-index:30;
     box-shadow:0 6px 24px rgba(0,0,0,.5);"></div>
<div id="combat" style="display:none; position:fixed; top:52px; right:8px; max-width:360px;
     max-height:70vh; overflow:auto; background:#2c2320ee; color:#e8ddd4; font-size:13px;
     border:1px solid #55423a; border-radius:8px; padding:10px 12px; z-index:30;
     box-shadow:0 6px 24px rgba(0,0,0,.5);"></div>
<div id="selbox" style="display:none"></div>
<div id="toast"></div>

<script src="frame.js?v=20260718a"></script>
<script src="salvo.js?v=20260718s"></script>
<script>
const W = document.getElementById('world'), VP = document.getElementById('viewport');
const OV = document.getElementById('overlay');
let GAME = null;                 // game descriptor from /api/state (map, grid, sides…)
let MAPW = 0, MAPH = 0, CPX = 75;
let HX = 64, HXC = 32, HYH = 59.5;   // hex polygon geometry, derived from the grid
let scale = 0.25, panX = 0, panY = 0;
let units = [], mySide = null, selected = null, legal = null, dragging = null;
let FLOW = null;                 // strategic-gate flow (turn, mover) when the game is gated
let PBM = null;                  // play-by-mail match status (null = no match)

// pan/zoom/layout/nav are ENGINE-LEVEL (ui/frame.js) — this screen only supplies hooks
function apply() { FRAME.apply(); }
function centerOn(x, y) { FRAME.centerOn(x, y); }
function myMovementTurn() {
  return !!FLOW && FLOW.mover === mySide && FLOW.phase === 'movement';
}
function myActableUnits() {
  // napoleonic command flow: "next unit" = the In Command units of MY
  // open activation that haven't acted yet [4.3.3/4.6]
  if (FLOW && FLOW.mode === 'napoleonic' && FLOW.command) {
    const act = FLOW.command.act;
    if (FLOW.phase === 'activation' && act && !act.pending
        && act.side === mySide && act.stage === 'move')
      return units.filter(u => (act.incommand || []).includes(u.id)
                               && u.onmap && u.ma > 0 && !u.status);
    return [];
  }
  if (!myMovementTurn()) return [];
  return units.filter(u => u.side === mySide && u.onmap && u.ma > 0 && !u.status);
}
FRAME.initFrame({
  viewport: VP, world: W, topbar: document.getElementById('topbar'),
  zoomMin: 0.10, zoomMax: 1.6,
  get: () => ({ panX, panY, scale, mapW: MAPW, mapH: MAPH }),
  set: o => { if (o.panX !== undefined) panX = o.panX;
              if (o.panY !== undefined) panY = o.panY;
              if (o.scale !== undefined) scale = o.scale; },
  fit: () => fitMap(),
  select: u => select(u, false),
  actable: myActableUnits,
  endBtnId: 'endphasebtn',
  turnDone: () => {
    if (!myMovementTurn()) return false;
    const mine = units.filter(u => u.side === mySide && u.onmap && u.ma > 0
                                   && u.status !== 'reserve');
    return mine.length > 0 && mine.every(u => u.status);
  },
  followTop: ['tierpanel','arrivals','combat','rulespanel','tablespanel','pbmpanel']
             .map(id => ({ id, gap: 8 })),
});
let toastT = null;
function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.style.display = 'block';
  clearTimeout(toastT); toastT = setTimeout(() => t.style.display = 'none', 6000);
}
function fitMap() {   // open with the whole map visible, centered
  scale = Math.min(VP.clientWidth / MAPW, VP.clientHeight / MAPH);
  panX = (VP.clientWidth - MAPW * scale) / 2;
  panY = (VP.clientHeight - MAPH * scale) / 2;
  apply();
}

// ---------- pan & zoom ----------
let panDrag = null;
VP.addEventListener('pointerdown', e => {
  if (e.target.closest('.counter')) return;
  panDrag = {x:e.clientX-panX, y:e.clientY-panY}; VP.setPointerCapture(e.pointerId);
});
VP.addEventListener('pointermove', e => {
  if (dragging) return dragMove(e);
  if (panDrag) { panX = e.clientX-panDrag.x; panY = e.clientY-panDrag.y; apply(); }
});
VP.addEventListener('pointerup', e => { if (dragging) dragEnd(e); panDrag = null; });
// wheel + zoom buttons are wired by FRAME.initFrame above
const toMap = e => { const r = W.getBoundingClientRect();
                     return {x:(e.clientX-r.left)/scale, y:(e.clientY-r.top)/scale}; };

// ---------- game boot (everything game-specific arrives with the state) ----------
function bootGame(g) {
  GAME = g;
  MAPW = g.map_w; MAPH = g.map_h; CPX = g.counter_px;
  if (g.grid.orient === 'pointy') {
    // pointy-top: size = dy/1.5; corners at (0,±size),(±dx/2,±size/2)
    HX = g.grid.dy / 1.5; HXC = HX / 2; HYH = g.grid.dx / 2;
  } else {
    // flat-top: size = dx/1.5; corners at (±size,0),(±size/2,±dy/2)
    HX = g.grid.dx / 1.5; HXC = HX / 2; HYH = g.grid.dy / 2;
  }
  document.getElementById('gamename').textContent = g.name.toUpperCase();
  document.title = g.name + ' — VALOR Engine';
  document.querySelector('img.map').src = g.map_url;
  const SB = document.getElementById('sidebtns');
  SB.innerHTML = '';
  g.sides.forEach(s => {
    const b = document.createElement('button');
    b.className = 'sidebtn'; b.id = 'side-' + s.id; b.textContent = s.label;
    b.onclick = () => {
      if (PBM) { toast(`Play-by-mail: you are ${sideLabel(PBM.human_side)} for this whole match — ${PBM.labels[PBM.ai_side]} plays the other side by email.`); return; }
      mySide = s.id; deselect();
      SB.querySelectorAll('.sidebtn').forEach(x => x.classList.remove('on'));
      b.classList.add('on');
      refresh();   // hotseat seat change re-renders panels + guidance
    };
    SB.appendChild(b);
  });
  if (!mySide) { mySide = g.sides[0].id; }
  document.getElementById('side-' + mySide).classList.add('on');
  if (window.SALVO) SALVO.init({
    slug: g.slug || window.DEMO_SLUG || 'game',
    onUpdate: () => { refresh(); },
  });
  fitMap();
}

// ---------- state ----------
async function refresh() {
  const s = await (await fetch('/api/state')).json();
  if (!GAME) bootGame(s.game);
  else GAME.tier = s.game.tier;      // active tier can change on reset
  units = s.units;
  FLOW = s.flow || null;
  PBM = s.pbm || null;
  PBM_OK = ('pbm' in s);   // key present = this game family plays by mail
  SALVO_ST = s.salvo || null;
  SALVO_OK = ('salvo' in s);   // family supports LLM-seat matches
  if (window.SALVO) { SALVO.setStatus(SALVO_ST); }
  if (PBM && mySide !== PBM.human_side) {   // a mailed match locks your seat
    mySide = PBM.human_side;
    document.querySelectorAll('#sidebtns .sidebtn').forEach(x => x.classList.remove('on'));
    const sb = document.getElementById('side-' + mySide);
    if (sb) sb.classList.add('on');
  }
  renderPBMBtn();
  if (document.getElementById('pbmpanel').style.display === 'block') renderPBMPanel();
  renderTierBtn();
  document.getElementById('note').textContent = s.notes;
  OV.setAttribute('width', MAPW); OV.setAttribute('height', MAPH);
  if (!combatActive()) clearBattleSel();
  renderFlow();
  renderArrivals();
  renderCombat();
  renderGuide();   // after the panels: it may mark a panel button as the sole way forward
  renderRules();
  render();
}

// ---------- guidance banner + sole-way-forward marker ----------
// Every state says what to do next; when only ONE button can advance the
// game, FRAME.soleNext gives it the red border (engine rule).
function cmdStepper() {
  // "where am I in the turn" strip for command-flow games (Bruce
  // 2026-07-17: phase navigation help — no more going in circles)
  const C3 = FLOW && FLOW.command;
  if (!C3) return '';
  const steps = [
    ['command',    'Pool'],
    ['initiative', 'Initiative'],
    ['activation', `Activations${C3.pool_left ? ` (${C3.pool_left} LIM${
                     C3.pool_left > 1 ? 's' : ''} left)` : ''}`],
    ['non_lim',    'Non-LIM'],
    ['rally',      'Rally'],
  ];
  const idx = Math.max(0, steps.findIndex(s => s[0] === FLOW.phase));
  return `<br><span style="font-size:11.5px;color:#9aa3ad">Turn flow: `
    + steps.map((s, i) =>
        i < idx ? `<span style="color:#7fae6b">${s[1]} ✓</span>`
        : i === idx ? `<b style="color:#ffd75e">▶ ${s[1]}</b>`
        : s[1]).join(' → ')
    + `</span>`;
}
function renderGuide() {
  if (FRAME.setGuideSuffix)   // guard: stale-cached frame.js
    FRAME.setGuideSuffix(FLOW && FLOW.mode === 'napoleonic' && !FLOW.over
                         ? cmdStepper() : '');
  if (!FLOW) {
    const t = GAME && GAME.tier ? GAME.tier.active : 0;
    FRAME.setGuide(t > 0
      ? 'Drag a counter to move it — the gate checks each move. No turn sequence is enforced at this tier.'
      : 'Free play (Tier 0) — no rules gate: drag any counter anywhere. You are the umpire.');
    FRAME.soleNext(null);
    return;
  }
  if (PBM && pbmGuide()) return;
  if (SALVO_ST && salvoGuide()) return;
  if (FLOW.over) {
    const vw = FLOW.victory && FLOW.victory.winner;
    FRAME.setGuide((vw
      ? `<b>${sideShort(vw)} WINS</b> [${FLOW.victory.cite}] — `
      : `GAME OVER after ${FLOW.turn - 1} turns — `)
      + `<b>Reset game</b> starts a new one.`, true);
    FRAME.soleNext('resetbtn');
    return;
  }
  if (FLOW.mode === 'napoleonic' && napGuide()) return;
  const mv = sideShort(FLOW.mover);
  if (FLOW.mover !== mySide) {
    if (aiActive) {
      FRAME.setGuide(document.getElementById('aimode').value === 'step'
        ? `The AI is playing <b>${mv}</b> — press <b>SPACE</b> to execute each highlighted action.`
        : `The AI is playing <b>${mv}</b> — sit back, every action animates on its own.`);
      FRAME.soleNext(null);
    } else {
      const ai = GAME && GAME.tier && GAME.tier.active >= 3;
      FRAME.setGuide(`It's <b>${mv}</b>'s turn, not yours. `
        + (ai ? `Press <b>▶ Play ${mv}’s turn</b> in the top bar to let the AI play it — or `
              : ``)
        + `click <b>${mv}</b> next to “play as:” to play that side yourself.`);
      FRAME.soleNext(ai ? 'aiplaybtn' : 'side-' + FLOW.mover);
    }
    return;
  }
  const A = FLOW.arrivals, C = FLOW.combat;
  if (FLOW.phase === 'movement') {
    const todo = [];
    if (A) {
      if (A.supply && A.supply.can_roll) todo.push('roll the <b>Supply Table</b>');
      if (A.supply && A.supply.pending && A.placements_open && A.ports.length)
        todo.push('land your supply at a port');
      if (A.due && A.due.length && A.placements_open && A.ports.length)
        todo.push('land your reinforcements');
      if (A.at_sea && A.at_sea.some(u => u.must_land))
        todo.push('<b>land your units at sea NOW</b> or they are eliminated');
    }
    if (todo.length) {
      FRAME.setGuide(`<b>Start of your turn</b> — in the top-left panel: ${todo.join('; ')}. Then move your units.`);
      // the supply roll is the one case with exactly one possible button
      FRAME.soleNext(todo.length === 1 && A.supply.can_roll
        ? '#arrivals button[onclick*="roll_supply"]' : null);
      return;
    }
    const left = myActableUnits().length;
    if (left) {
      FRAME.setGuide(`<b>Your move</b> — click a unit, then click a highlighted hex. `
        + `<b>unit ▶</b> (or the N key) jumps to your next unmoved unit — <b>${left}</b> to go. `
        + `Finished? <b>End player turn</b>.`);
      FRAME.soleNext(null);
      return;
    }
    FRAME.setGuide(`All units moved — press <b>End player turn</b>`
      + (C && (C.must_attack.length || C.must_be_attacked.length)
         ? ` to resolve the battles your moves created` : ``) + `.`);
    FRAME.soleNext('endphasebtn');
    return;
  }
  if (C && C.phase === 'combat') {
    if (C.pending_rommel) {
      FRAME.setGuide(`<b>Place Rommel</b> — pick one of the hexes offered in the left panel [22.4].`);
      FRAME.soleNext(null);
      return;
    }
    if (C.pending) {
      const what = { retreat:  'retreat each losing unit with the buttons',
                     exchange: 'pick which of your involved units to remove',
                     advance:  'advance into the vacated hex (optional)',
                     demolition: 'decide each bridge demolition — one chance ever [12.1]',
                     fpf:      'allocate Final Protective Fire (or decline) [8.4]' }[C.pending.kind]
                   || C.pending.kind;
      FRAME.setGuide(`<b>Finish the battle</b> — ${what}, in the left panel.`);
      FRAME.soleNext(null);
      return;
    }
    if (C.must_attack.length || C.must_be_attacked.length) {
      FRAME.setGuide(`<b>Combat</b> — units in enemy contact MUST fight [8.4]: click your attackers, `
        + `then the adjacent enemy defenders, then <b>⚔ Resolve battle</b> in the left panel.`);
      FRAME.soleNext(null);
      return;
    }
    FRAME.setGuide(`Combat finished — press <b>End player turn</b>.`);
    FRAME.soleNext('endphasebtn');
    return;
  }
  FRAME.setGuide('');
  FRAME.soleNext(null);
}

// ---------- napoleonic (GBoNW) guidance ----------
// Returns true when it handled the banner (renderGuide falls through
// otherwise). The return-fire window overrides everything: the DEFENDER
// owns the decision even during the enemy activation [8.1.2].
function napGuide() {
  // "the other side must decide" helper: at tier 3 the AI can answer

  // it's the hotseat side-switch
  const ai3 = !PBM && GAME && GAME.tier && GAME.tier.active >= 3;
  const waitOther = (who, what) => {
    if (aiActive) {
      FRAME.setGuide(`The AI is answering for <b>${sideShort(who)}</b>`

      + (ai3
         ? `Press <b>▶ AI: ${sideShort(who)}</b> in the top bar to let `
           + `the AI answer — or click <b>${who}</b> next to “play as:” `
           + `to answer it yourself.`
         : `Click <b>${who}</b> next to “play as:” (hotseat).`));
    FRAME.soleNext(ai3 ? 'aiplaybtn' : 'side-' + who);
    return true;
  };
  // phase-4 windows own the flow completely [6.2/8.2-8.5]
  const SH = FLOW.shock, RW = FLOW.reaction;
  if (SH) {
    const STAGE_TXT = {
      square_window: `<b>Cavalry charge incoming!</b> Your infantry may
        try to <b>form square</b> (roll) or <b>stand</b> (pre-melee
        check) — left panel [8.4.2#4].`,
      return_window: `<b>Melee declared on your stack</b> — your top
        unit may <b>return fire</b> before the shock lands (skirmishers
        may slip away) — left panel [8.2.1#3/8.4.2#5].`,
      continue_def: `<b>Melee continues</b> [8.5.3] — your defenders:
        <b>stand</b> for another round or <b>withdraw</b> (voluntary
        rout). Left panel.`,
      continue_att: `<b>Melee continues</b> [8.5.3] — your attackers:
        <b>stand</b> for another round or <b>withdraw</b> (voluntary
        rout). Left panel.`};
    if (SH.owner !== mySide) {
      return waitOther(SH.owner, `<b>Shock combat</b> — the
        ${SH.stage.replace('_',' ')} [8.2-8.5]`);
    } else {
      FRAME.setGuide(STAGE_TXT[SH.stage] || `<b>Shock combat</b> —
        decision in the left panel [8.2-8.5].`);
      FRAME.soleNext(null);
    }
    return true;
  }
  if (RW) {
    if (RW.owner !== mySide) {
      return waitOther(RW.owner, `<b>Reaction window</b> [6.2] — the
        moving unit triggered a reaction opportunity`);
    } else {
      FRAME.setGuide(`<b>Reaction window!</b> [6.2] — an enemy unit is
        moving through your zone. React with the entitled units in the
        left panel, or <b>Decline</b> (the move then continues).`);
      FRAME.soleNext(null);
    }
    return true;
  }
  const PF = FLOW.pending_fire;
  if (PF) {
    const dSide = PF.defender_side;
    if (dSide === mySide) {
      FRAME.setGuide(`<b>You are under fire!</b> Your unit may fire back `
        + `before results land (simultaneous) — <b>Return Fire</b> or `
        + `<b>Decline</b> in the left panel [8.1.2].`);
    } else {
      return waitOther(dSide, `<b>Return fire</b> [8.1.2]`);
    }
    return true;
  }
  if (FLOW.phase === 'rally') {
    if (FLOW.mover !== mySide) {
      return waitOther(FLOW.mover, `<b>Rally phase</b> [12.0]`);
    }
    FRAME.setGuide(`<b>Rally phase</b> [12.0] — click each of your shaken/`
      + `unsteady/routed units to attempt a rally (not adjacent to the `
      + `enemy), then <b>End player turn</b>. Routed units that stay `
      + `routed lose 1 SP and fall back [12.4].`);
    return true;
  }
  const v = FLOW.victory || {};
  const score = v.counts
    ? ` &nbsp;<span class="dim">broken units — French need Allied at 7: `
      + `${v.counts.Allied || 0}/7 · Russians need French at 10: `
      + `${v.counts.French || 0}/10 [A15.1]</span>` : '';
  const C3 = FLOW.command;
  if (C3) {                       // schema-3 command flow [3.0/4.0]
    const needSwitch = waitOther;
    if (FLOW.phase === 'command') {
      if (FLOW.mover !== mySide)
        return needSwitch(FLOW.mover, `<b>Pool Placement</b> [3.0.A]`);
      FRAME.setGuide(`<b>Pool Placement</b> [3.0.A / A15.1] — tick the LIMs `
        + `you commit to this turn's Command Pool (left panel), then `
        + `<b>Commit pool</b>. A committed LIM can be drawn and activated — `
        + `and its division gains fatigue whatever happens [13.1].` + score);
      FRAME.soleNext('poolcommit');
      return true;
    }
    if (FLOW.phase === 'initiative') {
      if (C3.initiative !== mySide)
        return needSwitch(C3.initiative, `<b>Initiative won</b> [4.4]`);
      FRAME.setGuide(`<b>You won the initiative</b> [4.4] — pick the LIM `
        + `that opens the turn in the left panel. ANY pool LIM is legal, `
        + `the enemy's included (it forces them to show their hand first).`);
      FRAME.soleNext(FLOW.command.pool.length === 1 ? '#arrivals button' : null);
      return true;
    }
    if (FLOW.phase === 'activation' && C3.act) {
      const act = C3.act;
      if (act.side !== mySide)
        return needSwitch(act.side, `<b>${act.lim || 'Breakdown opportunity'}</b>`);
      if (act.pending === 'choice') {
        FRAME.setGuide(`<b>${act.lim || 'Opportunity'} — choose the activation</b> `
          + `[4.5.1/4.6]: <b>Full</b> rolls against the leader's rating `
          + `(fail = Command Breakdown Table); <b>Limited</b> is automatic `
          + `but only half MA, no moving adjacent to the enemy, fire only. `
          + `Buttons in the left panel.`);
        FRAME.soleNext(null);
        return true;
      }
      if (act.pending === 'bd_offer') {
        FRAME.setGuide(`<b>Enemy command breakdown!</b> [4.7] — you may `
          + `activate your division closest to the failing commander (or `
          + `decline). Left panel.`);
        FRAME.soleNext(null);
        return true;
      }
      const label = act.kind === 'nonlim_unit' ? 'single unit (Out of Command)'
        : `${divName(act.div)} — ${act.atype} activation`;
      const nleft = myActableUnits().length;
      if (nleft === 0) {
        FRAME.setGuide(`<b>${label}</b> — every unit has acted or passed. `
          + `Fire/melee if you still want to, otherwise press `
          + `<b>End activation</b>.` + score);
        FRAME.soleNext('endphasebtn');
      } else {
        FRAME.setGuide(`<b>${label}</b> [4.6] — <b>unit ▶</b> (or N) jumps `
          + `to each green-ringed unit; drag it to a green hex. Click `
          + `enemies to <b>fire</b> (firing ends the division's movement). `
          + `Finished? <b>End activation</b>.` + score);
        FRAME.soleNext(null);
      }
      return true;
    }
    if (FLOW.phase === 'non_lim') {
      if (FLOW.mover !== mySide)
        return needSwitch(FLOW.mover, `<b>Non-LIM Phase</b> [3.0.C]`);
      FRAME.setGuide(`<b>Non-LIM Phase</b> [3.0.C] — divisions whose LIM `
        + `stayed out of the pool (and Out of Command units) may take a `
        + `LIMITED activation now, alternating with the enemy. Pick in the `
        + `left panel, or <b>Pass</b>.`);
      FRAME.soleNext(null);
      return true;
    }
    return false;
  }
  if (FLOW.mover !== mySide) return false;   // generic hotseat banner
  FRAME.setGuide(`<b>Your activation</b> — click a unit, then a highlighted `
    + `hex (facing follows the cheapest path; use ⟲ ⟳ to wheel). Click an `
    + `ENEMY counter while one of your units is selected to <b>fire</b> at `
    + `it [8.1]. Formation buttons are in the left panel. Finished? `
    + `<b>End player turn</b>.` + score);
  FRAME.soleNext(null);
  return true;
}
// short display name for a division key like "French:3" -> its leader
function divName(dk) {
  const d = FLOW.command && FLOW.command.divisions[dk];
  return d ? `${d.leader} (${dk.split(':')[1]})` : dk;
}

function renderFlow() {
  const fb = document.getElementById('flowbar');
  if (!FLOW) { FRAME.show('flowbar', false); FRAME.show('endphasebtn', false);
               FRAME.show('aictl', false); return; }
  FRAME.show('flowbar', true);
  // in a mailed match, the opponent's turn is untouchable locally
  let showEnd = !PBM || (!FLOW.over && FLOW.mover === mySide);
  const C3 = FLOW.command;
  if (C3 && !FLOW.over) {
    // command flow: the top-bar button only ever means "End activation"
    // (rally keeps its own end) - other phases drive through the panel
    const open = FLOW.phase === 'activation' && C3.act && !C3.act.pending
      && C3.act.side === mySide;
    showEnd = open || (FLOW.phase === 'rally' && FLOW.mover === mySide);
    document.getElementById('endphasebtn').textContent =
      FLOW.phase === 'rally' ? 'End rally' : 'End activation';
  } else if (FLOW.mode === 'napoleonic') {
    document.getElementById('endphasebtn').textContent =
      FLOW.phase === 'rally' ? 'End rally' : 'End player turn';
  }
  FRAME.show('endphasebtn', showEnd);
  // the AI opponent is a Tier-3 feature. Strategic family: offered at the
  // start of a player turn. Napoleonic: decisions interleave (LIM draws,
  // reaction/shock windows), so the AI is offered whenever the game is
  // waiting on a side you are NOT playing — it answers exactly that
  // side's decisions and stops when the flow returns to you.
  // Stepped (grognard) or animated auto-play, engine-driven one action at a time.
  const tier3 = !PBM && !FLOW.over && GAME && GAME.tier && GAME.tier.active >= 3;
  const aiOK = (tier3
    && (FLOW.mode === 'napoleonic'
        ? FLOW.decider !== mySide
        : (FLOW.phase === 'movement'
           && (FLOW.arrivals || FLOW.bluegray || FLOW.westwall))));
  // napoleonic: the cluster stays VISIBLE whenever the game has an AI —
  // vanishing controls read as broken (Bruce 2026-07-17). When the decision
  // is yours the button just waits, disabled.
  const napAI = tier3 && FLOW.mode === 'napoleonic';
  FRAME.show('aictl', aiOK || napAI);
  const AB = document.getElementById('aiplaybtn');
  AB.disabled = !aiOK;
  if (aiOK) AB.textContent =
    aiActive ? '■ stop'
    : (FLOW.mode === 'napoleonic'
       ? '▶ AI: ' + sideShort(FLOW.decider)
       : '▶ Play ' + sideShort(FLOW.mover) + '’s turn');
  else if (napAI) AB.textContent = 'AI waits — your decision';
  const PHASE_LBL = { command: 'Pool Placement', initiative: 'Initiative',
                      activation: 'LIM Activation', non_lim: 'Non-LIM',
                      rally: 'Rally' };
  fb.textContent = FLOW.over
    ? `GAME OVER after ${FLOW.turn - 1} turns`
    : `${FLOW.turn_label || ('turn ' + FLOW.turn)} — ${sideShort(FLOW.mover)} moves`
      + (FLOW.command && PHASE_LBL[FLOW.phase]
         ? ` · ${PHASE_LBL[FLOW.phase]}` : '')
      + (FLOW.overstacked && FLOW.overstacked.length
         ? `  ⚠ overstacked: ${FLOW.overstacked.join(' ')}` : '');
}

function sideLabel(id) { const s = GAME.sides.find(s => s.id === id); return s ? s.label : id; }

// ---------- arrivals / supply / sea panel (strategic gate) ----------
async function wwDrop(pid, target) {
  // try the target hex, then its ring, until the gate accepts [15.31]
  const [c, r] = target;
  const off = (c % 2) ? 1 : -1;
  const ring = [[c,r],[c,r-1],[c,r+1],[c+1,r],[c-1,r],[c+1,r+off],[c-1,r+off]];
  for (const hx of ring) {
    const rr = await (await fetch('/api/sg_action', {method:'POST',
      body: JSON.stringify({action: {type:'reinforce', unit: pid, hex: hx}})})).json();
    if (!rr.error) { refresh(); return; }
  }
  toast('no legal drop hex around the target — enemy occupation? [15.31/15.33]');
  refresh();
}
async function sgAction(action, side) {
  const r = await (await fetch('/api/sg_action', {method:'POST',
    body: JSON.stringify({action, side})})).json();
  if (r.error) toast('Gate: ' + r.error);
  else if (r.result && (r.result.result || r.result.note))
    toast(r.result.result || r.result.note);
  refresh();
}

  // which classed units still fight: B&G artillery/cavalry are combat units

  // classed units (markers/supply/hq) are not
  if (!FLOW) return !u.cls;

function toggleBattle(u, stack) {
  const C = FLOW.combat;
  if (C.pending || C.pending_rommel) { toast('settle the pending battle first [8.6]'); return; }
  if (!bgCombatant(u) || !u.onmap || u.status === 'eliminated' || u.status === 'reserve' || u.status === 'at sea') return;
  // a click toggles the whole same-side combat stack (11.4/11.5 splits stay
  // legal through the gate/API; the panel just doesn't offer them yet)
  const mates = (stack || [u]).filter(s => s.side === u.side && bgCombatant(s) && s.onmap
                                      && s.status !== 'eliminated');
  const set = u.side === FLOW.mover ? atkSel : defSel;

function render() {
  document.querySelectorAll('.counter,.badge').forEach(n => n.remove());
  // engine-level "who may act" highlight: the same set unit ▶ steps
  // through gets a visible ring on the map (Bruce's guidance rule)
  const ACTABLE = new Set(myActableUnits().map(u => u.id));
  const byhex = {};
  units.forEach(u => { if (u.status !== 'eliminated') (byhex[u.hexnum] = byhex[u.hexnum]||[]).push(u); });
  for (const h in byhex) byhex[h].forEach((u, i) => {
    const el = document.createElement('img');
    el.className = 'counter' + (u.status ? ' done' : '') + (selected && selected.id===u.id ? ' sel' : '')
      + (ACTABLE.has(u.id) && !(selected && selected.id===u.id) ? ' actable' : '');
    el.src = GAME.counters_url + encodeURIComponent(u.img || (u.name + '.png'));
    el.style.width = CPX + 'px'; el.style.height = CPX + 'px';
    el.style.margin = `-${CPX/2}px 0 0 -${CPX/2}px`;
    el.style.left = (u.x + i*14) + 'px'; el.style.top = (u.y - i*14) + 'px';
    el.style.zIndex = 10 + i;
    el.dataset.id = u.id;
    if (atkSel.has(u.id)) el.classList.add('selatk');
    else if (defSel.has(u.id)) el.classList.add('seldef');
    else if (u.morale_state === 'shaken') el.style.outline = '3px solid #e0c34e';
    else if (u.morale_state === 'unsteady') el.style.outline = '3px solid #e0862e';
    else if (u.morale_state === 'routed') el.style.outline = '4px solid #e0342e';
    if (u.facing !== null && u.facing !== undefined && GAME.facing)
      el.style.transform = `rotate(${(GAME.facing.offset_deg||0) + u.facing * GAME.facing.step_deg}deg)`;
    el.addEventListener('pointerenter', ev => { if (!dragging) showTip(u, ev.clientX, ev.clientY); });
    el.addEventListener('pointermove', ev => { if (!dragging) moveTip(ev.clientX, ev.clientY); });
    el.addEventListener('pointerleave', hideTip);
    el.addEventListener('pointerdown', ev => onCounterDown(ev, u, byhex[h]));
    el.addEventListener('contextmenu', ev => onCounterMenu(ev, u));
    W.appendChild(el);
    if (i === byhex[h].length-1 && byhex[h].length > 1) {
      const b = document.createElement('div');
      b.className = 'badge'; b.textContent = 'x' + byhex[h].length;
      b.style.left = u.x + 'px'; b.style.top = (u.y + 14) + 'px';
      W.appendChild(b);
    }
  });
  const P = document.getElementById('progress');
  if (FLOW && FLOW.mode === 'napoleonic' && FLOW.command) {
    // command flow: whole-side tallies mislead (only the ACTIVATED
    // division may act) — count the open activation instead
    const act = FLOW.command.act;
    if (FLOW.phase === 'activation' && act && !act.pending
        && act.side === mySide) {
      const squad = (act.incommand || [])
        .map(p => unitById(p)).filter(u => u && u.onmap && u.ma > 0);
      const doneA = squad.filter(u => u.status).length;
      P.textContent = `${act.div ? divName(act.div)
        : 'Out of Command unit'}: ${doneA} / ${squad.length} acted`;
    } else {
      P.textContent = '';   // no activation of yours open — nothing due
    }
  } else {
    const mine = units.filter(u => u.side===mySide && u.onmap && u.ma > 0
                                   && u.status !== 'reserve');
    const doneN = mine.filter(u => u.status).length;
    P.textContent =
      `${sideShort(mySide)} movement: ${doneN} / ${mine.length} units done`;
  }
  FRAME.onRender();     // engine frame: unit-nav visibility + end-turn glow
  renderSelBox();
  drawOverlay();
}

// ---------- hex highlight overlay ----------
const hexCorners = (x,y) => GAME.grid.orient === 'pointy'
  ? [[x,y-HX],[x+HYH,y-HXC],[x+HYH,y+HXC],[x,y+HX],[x-HYH,y+HXC],[x-HYH,y-HXC]]
  : [[x-HX,y],[x-HXC,y-HYH],[x+HXC,y-HYH],[x+HX,y],[x+HXC,y+HYH],[x-HXC,y+HYH]];
const hexPts = (x,y) => hexCorners(x,y).map(p => p.join(',')).join(' ');
function drawOverlay() {
  OV.innerHTML = '';
  if (!legal) return;
  if (legal.free) return;   // free play: no gate, no highlights — drop anywhere
  // dim everything except legal hexes + origin: evenodd path with hex holes
  let d = `M0 0 H${OV.getAttribute('width')} V${OV.getAttribute('height')} H0 Z `;
  const hole = (x,y) => 'M' + hexCorners(x,y).map(q=>q.join(' ')).join(' L ') + ' Z ';
  legal.dests.forEach(h => d += hole(h.x, h.y));
  d += hole(selected.x, selected.y);
  const path = document.createElementNS('http://www.w3.org/2000/svg','path');
  path.setAttribute('d', d); path.setAttribute('fill','rgba(0,0,0,0.62)'); path.setAttribute('fill-rule','evenodd');
  OV.appendChild(path);
  legal.dests.forEach(h => {
    const pg = document.createElementNS('http://www.w3.org/2000/svg','polygon');
    pg.setAttribute('points', hexPts(h.x, h.y));
    pg.setAttribute('fill','rgba(120,220,120,0.18)'); pg.setAttribute('stroke','#7ce07c');
    pg.setAttribute('stroke-width','4');
    OV.appendChild(pg);
    if (h.cost !== undefined) {   // MP spent to reach this hex
      const tx = document.createElementNS('http://www.w3.org/2000/svg','text');
      tx.setAttribute('x', h.x); tx.setAttribute('y', h.y + 46);
      tx.setAttribute('text-anchor','middle'); tx.setAttribute('font-size','24');
      tx.setAttribute('fill','#1d5c1d'); tx.setAttribute('font-weight','bold');
      tx.textContent = h.cost;
      OV.appendChild(tx);
    }
  });
}

// ---------- selection / picker ----------
function onCounterDown(ev, u, stackUnits) {
  ev.stopPropagation();
  if (combatActive()) { toggleBattle(u, stackUnits); return; }
  if (selected && selected.id === u.id && legal) { dragStart(ev, u); return; }
  // napoleonic: clicking an ENEMY while one of my units is selected =
  // attack it — fire, or (tier 2) melee/charge; the gate answers with
  // cited reasons if the pick isn't legal
  if (FLOW && FLOW.mode === 'napoleonic' && selected
      && selected.side === mySide && u.side !== mySide) {
    napAttackMenu(ev, u);
    return;
  }
  // napoleonic rally phase: clicking my own broken unit attempts the rally
  if (FLOW && FLOW.mode === 'napoleonic' && FLOW.phase === 'rally'
      && u.side === mySide) {
    sgAction({type:'rally', unit: u.id}, mySide);
    return;
  }
  // free play (no gate): any of your pieces is draggable — markers, track
  // pieces off the playable map, zero-MA units included (VASSAL parity)
  if (u.side !== mySide) return;
  // napoleonic tier 2: a unit that moved ≤ half MA may still CHARGE
  // [5.1.2] — keep moved units selectable so the attack click works
  if (u.status && !(FLOW && FLOW.mode === 'napoleonic'
                    && u.status === 'moved')) return;
  if (FLOW && (!u.onmap || u.ma === 0)) return;
  const eligible = FLOW
    ? stackUnits.filter(s => s.side===mySide && !s.status && s.ma>0)
    : stackUnits.filter(s => s.side===mySide && !s.status);
  if (eligible.length > 1) showPicker(ev, eligible);
  else select(u, false, ev);
}
// tier-2 attack chooser [8.1/8.2-8.4]: every option submits through the

function napAttackMenu(ev, tgt) {
  const arm = selected.arm || '';
  const tier2 = GAME.tier && GAME.tier.active >= 2;
  const opts = [];
  if (arm === 'infantry' || arm.startsWith('artillery'))
    opts.push([`🔥 Fire [8.1]`,
               {type:'fire', unit:selected.id, target:tgt.id}]);
  if (tier2 && arm === 'infantry')
    opts.push([`⚔ Melee — bayonet/assault [8.2/8.3]`,
               {type:'melee', unit:selected.id, target:tgt.id}]);
  if (tier2 && arm === 'cavalry')
    opts.push([`🐎 Charge [8.4]`,
               {type:'charge', unit:selected.id, target:tgt.id}]);
  if (!opts.length) {
    sgAction({type:'fire', unit:selected.id, target:tgt.id}, mySide);

  }

  const P = document.getElementById('picker');

  opts.forEach(([lbl, act]) => {

// ---------- drag restricted to legal hexes ----------
function dragStart(ev, u) {
  const el = document.querySelector(`.counter[data-id="${u.id}"]`);
  dragging = {u, el}; el.classList.add('dragging');
  TIP.style.display = 'none';
  ev.stopPropagation();

function dragMove(e) {
  const m = toMap(e);
  dragging.el.style.left = m.x+'px'; dragging.el.style.top = m.y+'px';
  // live snap preview: brighten nearest legal hex
  let best = nearestLegal(m);
  OV.querySelectorAll('polygon').forEach(p => p.setAttribute('stroke-width','4'));
  if (best) {
    const i = legal.dests.indexOf(best);
    const pg = OV.querySelectorAll('polygon')[i];
    if (pg) pg.setAttribute('stroke-width','12');
  }
}
function nearestLegal(m) {
  let best = null, bd = 70*70;   // must drop within ~70px of a legal hex center
  legal.dests.forEach(h => { const d=(h.x-m.x)**2+(h.y-m.y)**2; if (d<bd){bd=d;best=h;} });
  return best;
}
async function dragEnd(e) {
  const m = toMap(e), u = dragging.u;
  dragging.el.classList.remove('dragging'); dragging = null;
  const best = nearestLegal(m);
  if (!best) { render(); return; }   // illegal drop -> snap back, nothing written
  const r = await (await fetch('/api/move', {method:'POST',
      body:JSON.stringify({id:u.id, dest:best.hexnum, whole:selected.whole})})).json();
  if (r.error) toast('Gate: ' + r.error);
  deselect(); refresh();
}

async function pbmStart(side) {

async function pbmExport() {
  const r = await fetch('/api/pbm/export');
  const cd = r.headers.get('Content-Disposition') || '';
  if (!cd) { const e = await r.json(); toast(e.error || 'export failed'); return; }
  const m = cd.match(/filename="([^"]+)"/);
  const a = document.createElement('a');
  a.href = URL.createObjectURL(await r.blob());
  a.download = m ? m[1] : 'pbm_turn.json';
  a.click();
  URL.revokeObjectURL(a.href);
  toast('Turn file downloaded — attach it to an email to ' + pbmOpp() + '.');
  refresh();
}
async function pbmImportFile(ev) {
  const f = ev.target.files[0];
  ev.target.value = '';
  if (!f) return;
  let doc;
  try { doc = JSON.parse(await f.text()); }
  catch (e) { toast('That is not a turn file (' + e + ')'); return; }
  if (doc.format === 'vsav-pbm-reject/1') {
    toast('Your opponent REJECTED your last file: ' + doc.reason);
    return;
  }
  const r = await (await fetch('/api/pbm/import', {method:'POST',
    body: JSON.stringify({doc})})).json();
  if (r.error) { toast(r.error); return; }
  deselect();
  await refresh();
  pbmShowReplay(r.new_entries || []);
}
function pbmDescribe(e) {
  const a = e.action || {};
  const nm = id => { const x = unitById(id); return x ? x.name : id; };
  const hx = h => Array.isArray(h) && h.length > 1
    ? String(h[0]).padStart(2,'0') + String(h[1]).padStart(2,'0') : '?';
  const res = e.result && (e.result.result || e.result.note);
  try { switch (a.type) {
    case 'move':      return `${nm(a.unit)} → ${hx(a.dest)}`;
    case 'battle':    return `⚔ ${(a.attackers||[]).map(nm).join(' + ')} attack ${(a.defenders||[]).map(nm).join(' + ')}${res ? ' — ' + res : ''}`;
    case 'retreat':   return a.eliminate ? `${nm(a.unit)} has no retreat — eliminated` : `${nm(a.unit)} retreats`;
    case 'advance':   return (a.decline || !a.unit) ? 'declines the advance'
                             : `${nm(a.unit)} advances to ${hx(a.dest || a.hex)}`;
    case 'reinforce': return `${nm(a.unit)} enters at ${hx(a.hex)}`;
    case 'exit':      return `${nm(a.unit)} exits the map`;
    case 'end_movement': return 'ends movement — battles resolve';
    case 'end_phase': return 'ends the player turn';
    default:          return String(a.type || '?').replace(/_/g,' ') + (a.unit ? ' ' + nm(a.unit) : '') + (res ? ' — ' + res : '');
  } } catch (err) { return String(a.type || '?').replace(/_/g,' '); }
}
function pbmShowReplay(entries) {
  soloPanel('pbmpanel') || soloPanel('pbmpanel');   // force open
  const P = document.getElementById('pbmpanel');
  const opp = PBM ? pbmOpp() : 'your opponent';

    h += `<div class="dim">(showing the last ${shown.length} of ${entries.length} actions)</div>`;
  h += `<ol style="margin:6px 0;padding-left:20px">`;
  shown.forEach(e => h += `<li>${pbmDescribe(e)}</li>`);
  h += `</ol>`;
  if (!entries.length) h += `<div class="dim">no actions (opening file)</div>`;
  h += `<button class="sidebtn" onclick="renderPBMPanel()">OK — my turn</button>`;
  P.innerHTML = h;
  renderPBMBtn();
}

async function salvoPayload(copy) {
  const r = await SALVO.payload();

    try { await navigator.clipboard.writeText(r.text); }
    catch (e) { toast('Clipboard blocked — use Download instead.'); return; }
    toast('Challenger payload copied — paste it into your LLM.');
  } else {
    const a = document.createElement('a');
    a.href = URL.createObjectURL(new Blob([r.text], { type: 'text/markdown' }));
    a.download = r.filename || 'salvo_payload.md';
    a.click();
    URL.revokeObjectURL(a.href);
  }
}

// ---------- stepped / animated AI (engine-driven, one action at a time) ----------
// Every StrategicGame with a policy AI gets this from the engine's TurnStepper:
// /api/ai_step reveals the next action's intent, then executes it. Stepped mode
// waits for SPACE (grognards approve each move); auto mode plays on a timer until
// the turn ends — either way you watch the turn unfold counter by counter instead
// of jump-cutting from turn-start to turn-end.
let aiBusy = false, aiActive = false, aiNext = null;

function showThinking(on) {
  FRAME.show('aithinking', on);
}
function drawAIIntent(nx) {
  [...OV.querySelectorAll('.aimark')].forEach(e => e.remove());
  if (!nx || !nx.action) return;
  const a = nx.action;
  const ring = (x, y, color) => {
    const pg = document.createElementNS('http://www.w3.org/2000/svg', 'polygon');
    pg.setAttribute('points', hexPts(x, y)); pg.setAttribute('class', 'aimark');
    pg.setAttribute('fill', 'none'); pg.setAttribute('stroke', color);
    pg.setAttribute('stroke-width', '6'); OV.appendChild(pg);
  };
  const actor = units.find(u => u.id === a.unit
                 || (a.attackers && a.attackers.includes(u.id)));
  if (actor) ring(actor.x, actor.y, '#ffd75e');                 // acting unit: yellow
  (a.defenders || []).forEach(dp => {                            // battle targets: red
    const d = units.find(u => u.id === dp); if (d) ring(d.x, d.y, '#ff6a5e');
  });
  if (a.target) {                                                // fire/melee/charge target
    const t = units.find(u => u.id === a.target);
    if (t) ring(t.x, t.y, '#ff6a5e');
  }
}
async function aiStepOnce() {
  if (aiBusy) return { done: true };
  aiBusy = true; showThinking(true);
  let r;
  try {
    r = await (await fetch('/api/ai_step', { method: 'POST', body: '{}' })).json();
  } catch (e) { aiBusy = false; showThinking(false); toast('AI step failed: ' + e); return { done: true }; }
  aiBusy = false; showThinking(false);
  if (r.error) { toast('Gate: ' + r.error); return { done: true }; }
  if (r.flow) FLOW = r.flow;
  if (r.step) await refresh();          // an action executed — board reflects it
  aiNext = r.next; drawAIIntent(aiNext);
  if (aiNext && aiNext.action) {        // follow the camera to the acting unit
    const aid = aiNext.action.unit
             || (aiNext.action.attackers && aiNext.action.attackers[0]);
    const au = units.find(u => u.id === aid);
    if (au && au.onmap) centerOn(au.x, au.y);
  }
  if (r.step) {
    const v = r.step.verdict, bad = v && !v.legal;
    if (bad) toast('Gate rejected: ' + (v.reasons || []).join('; '));
  }
  if (r.done) { aiNext = null; drawAIIntent(null); await refresh(); }
  return r;
}
async function aiAutoLoop() {
  if (!aiActive) return;
  const r = await aiStepOnce();
  if (r.done || !aiActive) { aiActive = false; renderFlow(); return; }
  const pace = parseInt(document.getElementById('aipace').value);
  // pace only between EXECUTED actions; the initial reveal advances immediately
  setTimeout(aiAutoLoop, r.step ? pace : 0);
}
async function startAI() {
  if (aiActive) { aiActive = false; renderFlow(); return; }   // toggle: stop
  aiActive = true; renderFlow();
  document.getElementById('aiplaybtn').blur();   // so SPACE steps, not re-clicks the button
  if (document.getElementById('aimode').value === 'auto') {
    aiAutoLoop();
  } else {
    await aiStepOnce();                 // reveal the first intent; SPACE advances
  }
}
document.getElementById('aiplaybtn').onclick = startAI;
document.getElementById('aimode').onchange = () => {
  if (aiActive && document.getElementById('aimode').value === 'auto') aiAutoLoop();
};
document.addEventListener('keydown', e => {
  if (e.code !== 'Space') return;
  if (!aiActive || aiBusy) return;
  if (document.getElementById('aimode').value !== 'step') return;
  e.preventDefault();
  aiStepOnce().then(r => { if (r.done) { aiActive = false; renderFlow(); } });
});

refresh();
